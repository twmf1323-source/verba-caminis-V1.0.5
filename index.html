        function renderDictLangPills() {
            const container = document.getElementById('dict-lang-pills');
            if (!container) return;

            const options = [
                { key: 'all', label: '全部' },
                { key: 'ja', label: '日語' },
                { key: 'ko', label: '韓語' },
                { key: 'fr', label: '法語' }
            ];

            container.innerHTML = options.map(opt => {
                const active = dictFilters.language === opt.key;
                return `<button onclick="setDictLanguage('${opt.key}')"
                               class="btn btn-pill ${active 
                                   ? 'bg-[#069494] text-white border-[#069494] shadow-sm' 
                                   : 'border-slate-200 hover:border-slate-300 text-slate-600 bg-white hover:bg-slate-50'}">
                            ${opt.label}
                        </button>`;
            }).join('');
        }

        function renderDictPOSPills(allEntries) {
            const container = document.getElementById('dict-pos-pills');
            if (!container) return;

            const posSet = new Set();
            // Only collect POS that are in our configured/known lists (prevents raw Korean like "동사","접속詞" or other unconfigured from appearing as filter pills)
            allEntries.forEach(e => {
                if (e.pos && ALL_KNOWN_POS.includes(e.pos)) {
                    posSet.add(e.pos);
                }
            });
            // Ensure ALL configured known POS always appear as pills (even for langs/books with no data yet)
            ALL_KNOWN_POS.forEach(p => posSet.add(p));

            // Clean any stale/rogue filters that are not known (e.g. old data filters or unmapped before)
            const stale = [];
            dictFilters.pos.forEach(p => { if (!ALL_KNOWN_POS.includes(p)) stale.push(p); });
            stale.forEach(p => dictFilters.pos.delete(p));

            const sortedPOS = Array.from(posSet).sort((a,b) => a.localeCompare(b, 'zh'));

            container.innerHTML = sortedPOS.map(pos => {
                const c = POS_COLORS[pos] || { bg: "#C0CCD8", text: "#1F2937", border: "#A0B0C0" };
                const active = dictFilters.pos.has(pos);

                const style = active 
                    ? `background-color:${c.bg}; color:${c.text}; border-color:${c.border};`
                    : `background-color:#fff; color:#475569; border-color:#cbd5e1;`;

                return `<button onclick="toggleDictPOS('${pos}')"
                                class="px-3 py-1 text-xs rounded-2xl border transition-all"
                                style="${style}">
                            ${pos}
                        </button>`;
            }).join('');
        }

        function setDictLanguage(lang) {
            dictFilters.language = lang;
            renderDictionary();
        }

        function toggleDictPOS(pos) {
            if (dictFilters.pos.has(pos)) {
                dictFilters.pos.delete(pos);
            } else {
                dictFilters.pos.add(pos);

            renderDictionary();
        }

        function clearDictPOSFilters() {

        function handleAIJsonFileSelected(event) {
            const file = event.target.files && event.target.files[0];
            if (!file) return;

            const ta = document.getElementById('ai-import-textarea');
            if (!ta) return;

            const reader = new FileReader();
            reader.onload = (ev) => {
                const text = String(ev.target.result || '');
                try {
                    JSON.parse(text.trim());
                    ta.value = text;
                    updateAIImportPreviewTropical(text);

                    const nameEl = document.getElementById('ai-import-file-name');
                    if (nameEl) {
                        nameEl.classList.remove('hidden');
                        const span = nameEl.querySelector('span');
                        if (span) span.textContent = `已載入：${file.name}`;
                    }
                    showToast(`已載入 ${file.name}`);
                } catch (e) {
                    alert('JSON 檔案格式有誤：\n' + e.message);
                }
                event.target.value = '';
            };
            reader.onerror = () => alert('檔案讀取失敗');
            reader.readAsText(file, 'UTF-8');
        }

            const fence = s.match(/```(?:json)?\s*([\s\S]*?)```/i);
            if (fence) s = fence[1].trim();

            try {
                JSON.parse(s);
                return s;
            } catch (_) { /* continue */ }

            const firstBrace = s.indexOf('{');
            const firstBracket = s.indexOf('[');
            let start = -1;
            if (firstBrace === -1) start = firstBracket;
            else if (firstBracket === -1) start = firstBrace;
            else start = Math.min(firstBrace, firstBracket);
            if (start < 0) throw new Error('找不到 JSON 物件或陣列');

            const open = s[start];
            const close = open === '{' ? '}' : ']';
            let depth = 0;
            let inStr = false;
            let esc = false;
            for (let i = start; i < s.length; i++) {
                const ch = s[i];
                if (inStr) {
                    if (esc) esc = false;
                    else if (ch === '\\') esc = true;
                    else if (ch === '"') inStr = false;
                    continue;
                }
                if (ch === '"') { inStr = true; continue; }
                if (ch === open) depth++;
                else if (ch === close) {
                    depth--;
                    if (depth === 0) {
                        const candidate = s.slice(start, i + 1);
                        JSON.parse(candidate);
                        return candidate;
                    }
                }
            }
            throw new Error('JSON 不完整（可能被截斷）。可複製下方原文手動修後用「從 AI 導入」');
        }

        // 長歌詞分段（含 E 解釋後輸出變長，每段略縮）
        const AI_CHUNK_LINES = 6;
        const AI_CHUNK_LINE_THRESHOLD = 8;
        const AI_MAX_OUTPUT_TOKENS = 16384;

        /**
         * OpenAI-compatible Chat Completions 串流
         * @returns {Promise<{ text: string, finishReason: string|null }>}
         */
        async function streamChatCompletion({ baseUrl, apiKey, model, messages, onDelta, signal, maxTokens }) {
            const url = `${baseUrl.replace(/\/+$/, '')}/chat/completions`;
            const maxOut = maxTokens || AI_MAX_OUTPUT_TOKENS;
            let res;
            try {
                res = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model,
                        stream: true,
                        temperature: 0.2,
                        // 長 JSON 語素分析需要較大輸出；部分供應商認 max_tokens，部分認 max_completion_tokens
                        max_tokens: maxOut,
                        max_completion_tokens: maxOut,
                        messages
                    }),
                    signal
                });
            } catch (netErr) {
                const msg = (netErr && netErr.message) || String(netErr);
                if (/Failed to fetch|NetworkError|CORS|Load failed/i.test(msg) || netErr.name === 'TypeError') {
                    throw new Error(
                        '無法連線到 API（常見原因：瀏覽器 CORS 阻擋、離線、或 Base URL 錯誤）。\n' +
                        '建議：使用支援瀏覽器的閘道、本機 Ollama、或自架反向代理；仍可改用「從 AI 導入」手動流程。\n' +
                        '原始錯誤：' + msg
                    );
                }
                throw netErr;
            }

            // 若同時送 max_tokens + max_completion_tokens 被拒，退回只送 max_tokens 重試一次
            if (!res.ok && res.status === 400) {
                const errText = await res.text().catch(() => '');
                if (/max_completion_tokens|max_tokens|unknown|unsupported|invalid/i.test(errText)) {
                    res = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model,
                            stream: true,
                            temperature: 0.2,
                            max_tokens: maxOut,
                            messages
                        }),
                        signal
                    });
                } else {
                    let detail = errText.slice(0, 400);
                    try {
                        const j = JSON.parse(errText);
                        detail = j.error?.message || j.message || detail;
                    } catch (_) {}
                    throw new Error(`API 錯誤 400：${detail}`);
                }
            }

            if (!res.ok) {
                const errText = await res.text().catch(() => '');
                let detail = errText.slice(0, 400);
                try {
                    const j = JSON.parse(errText);
                    detail = j.error?.message || j.message || detail;
                } catch (_) {}
                throw new Error(`API 錯誤 ${res.status}：${detail}`);
            }

            if (!res.body || !res.body.getReader) {
                const text = await res.text();
                try {
                    const j = JSON.parse(text);
                    const content = j.choices?.[0]?.message?.content || '';
                    const fr = j.choices?.[0]?.finish_reason || null;
                    if (onDelta) onDelta(content, content);
                    return { text: content, finishReason: fr };
                } catch (_) {
                    if (onDelta) onDelta(text, text);
                    return { text, finishReason: null };
                }
            }

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let full = '';
            let finishReason = null;

            const consumeSseLine = (line) => {
                const trimmed = line.trim();
                if (!trimmed || !trimmed.startsWith('data:')) return;
                const data = trimmed.slice(5).trim();
                if (!data || data === '[DONE]') return;
                try {
                    const json = JSON.parse(data);
                    const choice = json.choices && json.choices[0];
                    if (choice && choice.finish_reason) finishReason = choice.finish_reason;
                    const delta = choice?.delta?.content ?? choice?.text ?? '';
                    if (delta) {
                        full += delta;
                        if (onDelta) onDelta(delta, full);
                    }
                } catch (_) {
                    // 忽略非整段 JSON 的 SSE 行
                }
            };

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const parts = buffer.split(/\r?\n/);
                buffer = parts.pop() || '';
                for (const line of parts) consumeSseLine(line);
            }
            // flush 尾端殘餘
            if (buffer.trim()) {
                for (const line of buffer.split(/\r?\n/)) consumeSseLine(line);
            }
            return { text: full, finishReason };
        }

        /** 從舊版大包 JSON 文字抽出 tokens 陣列（fallback） */
        function parseTokensFromAIOutput(text) {
            const jsonText = extractJSONTextFromAIOutput(text);
            const data = JSON.parse(jsonText);
            if (Array.isArray(data)) return data;
            if (data && Array.isArray(data.tokens)) return data.tokens;
            throw new Error('JSON 內找不到 tokens 陣列');
        }

        /**
         * 一鍵 JSONL 單字母欄位 → 內部完整欄位
         * S=surface M=meaning P=pos L=line F=furigana E=explanation
         * H=phonetic B=lemma(base) I=inflection N=note
         * 亦相容完整欄位名（surface/meaning…）
         */
        function expandCompactToken(obj) {
            if (!obj || typeof obj !== 'object' || Array.isArray(obj)) return null;
            const surface = obj.S ?? obj.s ?? obj.surface ?? obj.value ?? obj.token ?? '';
            if (!String(surface).trim()) return null;
            const lineRaw = obj.L ?? obj.l ?? obj.line ?? obj.lineNumber ?? null;
            let line = null;
            if (lineRaw != null && lineRaw !== '') {
                const n = Number(lineRaw);
                line = Number.isFinite(n) ? n : null;
            }
            return {
                surface: String(surface).trim(),
                meaning: String(obj.M ?? obj.m ?? obj.meaning ?? obj.translation ?? obj.gloss ?? '').trim(),
                pos: String(obj.P ?? obj.p ?? obj.pos ?? obj.partOfSpeech ?? '').trim(),
                line,
                furigana: String(obj.F ?? obj.f ?? obj.furigana ?? obj.kana ?? '').trim(),
                explanation: String(obj.E ?? obj.e ?? obj.explanation ?? '').trim(),
                phonetic: String(obj.H ?? obj.h ?? obj.phonetic ?? obj.ipa ?? '').trim(),
                lemma: String(obj.B ?? obj.b ?? obj.lemma ?? obj.base ?? '').trim(),
                inflection: String(obj.I ?? obj.i ?? obj.inflection ?? '').trim(),
                note: String(obj.N ?? obj.n ?? obj.note ?? '').trim()
            };
        }

        /** 解析單行（可能含雜訊）為 compact token 物件 */
        function parseOneJSONLLine(line) {
            let s = String(line || '').trim();
            if (!s) return null;
            if (s.startsWith('```')) s = s.replace(/^```(?:json)?/i, '').replace(/```$/i, '').trim();
            if (!s || s.startsWith('//') || s.startsWith('#')) return null;
            // 去掉行首編號 "1. " / "- "
            s = s.replace(/^\d+[\.\)]\s*/, '').replace(/^[-*•]\s*/, '').trim();
            const start = s.indexOf('{');
            const end = s.lastIndexOf('}');
            if (start < 0 || end <= start) return null;
            const slice = s.slice(start, end + 1);
            try {
                const obj = JSON.parse(slice);
                if (Array.isArray(obj)) return null;
                return expandCompactToken(obj);
            } catch (_) {
                return null;
            }
        }

        /**
         * 從串流全文解析 JSONL 語素；若失敗則 fallback 舊大包 JSON
         * @returns {{ tokens: object[], mode: 'jsonl'|'legacy' }}
         */
        function parseAILiveOutputToTokens(text) {
            const raw = String(text || '');
            const tokens = [];
            const lines = raw.split(/\r?\n/);
            for (const line of lines) {
                const t = parseOneJSONLLine(line);
                if (t) tokens.push(t);
            }
            // 同一行多個 }{ 黏在一起
            if (tokens.length === 0 && raw.includes('{') && raw.includes('}')) {
                const glued = raw.replace(/\r\n/g, '\n');
                // 嘗試按 }{ 拆
                const parts = glued.split(/\}\s*\{/).map((part, i, arr) => {
                    if (arr.length === 1) return part;
                    if (i === 0) return part + '}';
                    if (i === arr.length - 1) return '{' + part;
                    return '{' + part + '}';
                });
                for (const p of parts) {
                    const t = parseOneJSONLLine(p.trim());
                    if (t) tokens.push(t);
                }
            }
            if (tokens.length > 0) return { tokens, mode: 'jsonl' };

            // fallback：舊 verbaCarminisImport / tokens 陣列
            try {
                const legacy = parseTokensFromAIOutput(raw);
                const expanded = legacy.map((x) => expandCompactToken(typeof x === 'string' ? { S: x } : x)).filter(Boolean);
                if (expanded.length) return { tokens: expanded, mode: 'legacy' };
            } catch (_) { /* ignore */ }
            return { tokens: [], mode: 'jsonl' };
        }

        /**
         * 一鍵專用短提示詞：JSONL + 單字母欄位（不走完整 buildAIPrompt）
         */
        function buildAILivePrompt(opts) {
            opts = opts || {};
            const lang = (currentBook && currentBook.language) || 'ja';
            const lineOffset = Math.max(0, Number(opts.lineOffset) || 0);

            let lyrics = '';
            if (opts.lyrics != null) lyrics = String(opts.lyrics);
            else if (currentBook && currentBook.rawLyrics) lyrics = currentBook.rawLyrics;
            else {
                const inp = document.getElementById('lyrics-input');
                lyrics = inp ? inp.value.trim() : '';
            }

            const linesArr = lyrics.split(/\r?\n/);
            const marked = linesArr.map((l, i) => {
                const cleaned = String(l).replace(/^\[L\d+\]\s*/, '');
                return `[L${lineOffset + i + 1}] ${cleaned}`;
            }).join('\n');

            let posList = '助詞,名詞,動詞,助動詞,形容詞,副詞,感動詞,連體詞,接續詞,其他';
            let langName = '日語';
            let extraFields = 'F=平假名讀音（必填）';
            // E=explanation 必填：辭源/固定表達/活用等（精簡但仍要有內容）
            let eRule = 'E=解釋（必填，≤80字）：名詞寫辭源；助詞寫固定句型；動詞寫原形+活用種類；其他寫語感/用法';
            let examples = `{"S":"君","F":"きみ","M":"你","P":"名詞","L":${lineOffset + 1},"E":"和語。歌詞中指對方，帶親密感"}
{"S":"の","F":"の","M":"的","P":"助詞","L":${lineOffset + 1},"E":"連體修飾。固定：〜の中で／〜のような"}
{"S":"名","F":"な","M":"名字","P":"名詞","L":${lineOffset + 1},"E":"漢語「名」。常與「を呼ぶ」搭配"}`;

            if (lang === 'ko') {
                langName = '韓語';
                posList = '名詞,動詞,形容詞,冠形詞,副詞,助詞,感嘆詞,接續詞,其他';
                extraFields = 'F可省略';
                eRule = 'E=解釋（必填，≤80字）：名詞寫辭源(漢字/固有/外來)；助詞寫格/話題功能與常見搭配；動詞寫原形+語尾';
                examples = `{"S":"사랑","M":"愛","P":"名詞","L":${lineOffset + 1},"E":"固有語。歌詞高頻，表情感"}
{"S":"을","M":"賓格","P":"助詞","L":${lineOffset + 1},"E":"目的格。母音後用를、子音後을"}`;
            } else if (lang === 'fr') {
                langName = '法語';
                posList = '名詞,限定詞,形容詞,代詞,動詞,副詞,介詞,連接詞,感嘆詞,其他';
                extraFields = 'H=IPA音標 B=原形 I=變化規則（皆宜短、必填）';
                eRule = 'E=解釋（必填，≤80字）：文法細節+歌詞語感；動詞可再對照 B/I';
                examples = `{"S":"je","H":"ʒə","B":"je","I":"主格","M":"我","P":"代詞","L":${lineOffset + 1},"E":"人稱代詞主格，歌詞口語常省略後續"}
{"S":"t'aime","H":"tɛm","B":"aimer","I":"1sg現在+t'","M":"愛你","P":"動詞","L":${lineOffset + 1},"E":"aimer 現在式；t'為 te 在母音前省略"}`;
            }

            const chunkNote = opts.chunkNote
                ? `\n【分段】${opts.chunkNote}\n`
                : '';

            return `你是${langName}歌詞語素分析器。只輸出 JSONL（每行一個 JSON 物件），禁止 markdown、禁止陣列外殼、禁止前言後語。

欄位（單字母，勿用完整英文 key）：
- S=表面形（必填）
- M=意思（必填，≤20字，核心語感）
- P=詞性（必填，只能：${posList}）
- L=行號（必填，對應下方 [L#] 的絕對行號）
- ${extraFields}
- ${eRule}

規則：
1. 一行歌詞拆成多個語素，每個語素單獨一行 JSON。
2. **每個語素都必須有 E**，不可省略、不可空字串。
3. surface(S) 不可跨 [L#] 行；L 必須等於該行號。
4. 日語複合動詞要拆開（鳴り+止む）。
5. 空白行可略過不輸出。
6. M 短、E 補細節；兩者不要重複貼同一句。
${chunkNote}
範例格式：
${examples}

歌詞（含絕對行號）：
${marked}`;
        }

        }

                    <div class="px-6 py-4 border-t flex flex-wrap items-center justify-between gap-2 bg-slate-50 rounded-b-3xl">
                        <button type="button" onclick="showAIImportModal(); closeAILiveModal();"
                                class="px-3 py-2 text-xs rounded-2xl border border-slate-300 hover:bg-white text-slate-600">
                            改手動導入
                        </button>
                        <div class="flex items-center gap-x-2">
                            <button type="button" id="ai-live-cancel-btn" onclick="cancelAILiveStream()"
                                    class="hidden px-4 py-2 text-sm rounded-2xl border border-red-200 text-red-600 hover:bg-red-50">
                                取消串流
                            </button>
                            <button type="button" id="ai-live-import-btn" onclick="importAILiveResult()"
                                    class="hidden px-4 py-2 text-sm rounded-2xl border border-teal-300 text-teal-700 hover:bg-teal-50">
                                導入目前結果
                            </button>
                            <button type="button" id="ai-live-start-btn" onclick="startAILiveAnalyze()"
                                    class="px-5 py-2 text-sm rounded-2xl bg-teal-600 hover:bg-teal-700 text-white flex items-center gap-x-2">
                                <i class="fa-solid fa-play text-xs"></i>
                                <span>開始串流分析</span>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            const keyEl = document.getElementById('ai-live-api-key');
            const baseEl = document.getElementById('ai-live-base-url');
            const modelEl = document.getElementById('ai-live-model');
            if (keyEl) keyEl.value = settings.apiKey || '';
            if (baseEl) baseEl.value = settings.baseUrl || AI_DEFAULT_BASE;
            if (modelEl) modelEl.value = settings.model || AI_DEFAULT_MODEL;
        }

        function closeAILiveModal() {
            cancelAILiveStream();
            const m = document.getElementById('ai-live-modal');
            if (m) m.remove();
        }

        function cancelAILiveStream() {
            if (_aiStreamAbort) {
                try { _aiStreamAbort.abort(); } catch (_) {}
                _aiStreamAbort = null;
            }
            const cancelBtn = document.getElementById('ai-live-cancel-btn');
            const startBtn = document.getElementById('ai-live-start-btn');
            if (cancelBtn) cancelBtn.classList.add('hidden');
            if (startBtn) startBtn.disabled = false;
        }

        async function startAILiveAnalyze() {
            if (!currentBook) {
                alert('請先開啟一本歌詞本');
                return;
            }

            saveAISettingsFromModal({ silent: true });

            const settings = getAISettings();
            if (!settings.apiKey) {
                alert('請先貼上 API Key');
                return;
            }
            if (!settings.baseUrl) {
                alert('請填寫 Base URL');
                return;
            }
            if (!settings.model) {
                alert('請填寫模型名稱');
                return;
            }

            let lyrics = '';
            if (currentBook.rawLyrics) lyrics = currentBook.rawLyrics;
            else {
                const inp0 = document.getElementById('lyrics-input');
                lyrics = inp0 ? inp0.value.trim() : '';
            }
            if (!lyrics) {
                alert('請先在「原始歌詞」貼上歌詞（建議再按一次「分析歌詞」以保留分行）');
                return;
            }

            const inp = document.getElementById('lyrics-input');
            if (inp && inp.value.trim() && inp.value.trim() !== (currentBook.rawLyrics || '')) {
                currentBook.rawLyrics = inp.value;
                lyrics = inp.value;
            }

            const outEl = document.getElementById('ai-live-stream-out');
            const countEl = document.getElementById('ai-live-char-count');
            const startBtn = document.getElementById('ai-live-start-btn');
            const cancelBtn = document.getElementById('ai-live-cancel-btn');
            const importBtn = document.getElementById('ai-live-import-btn');
            const autoChunkEl = document.getElementById('ai-live-auto-chunk');
            const autoChunk = !autoChunkEl || autoChunkEl.checked;

            if (_aiStreamAbort) {
                try { _aiStreamAbort.abort(); } catch (_) {}
                _aiStreamAbort = null;
            }

            _aiLiveCollectedTokens = [];
            if (outEl) outEl.textContent = '';
            if (countEl) countEl.textContent = '0 語素';
            if (importBtn) importBtn.classList.add('hidden');
            if (startBtn) startBtn.disabled = true;
            if (cancelBtn) cancelBtn.classList.remove('hidden');
            setAILiveStatus('連線中…', 'run');

            const controller = new AbortController();
            _aiStreamAbort = controller;

            const systemMsg = {
                role: 'system',
                content: '你是語素分析引擎。只輸出 JSONL：每行一個 JSON 物件。鍵名必須用單字母 S/M/P/L/F/E/H/B/I（禁止 surface、meaning 等完整英文 key）。每個物件必須含非空的 E（explanation 解釋）。禁止 markdown、禁止外層陣列或 verbaCarminisImport 大包。不要前言或結尾。'
            };

            const allLines = lyrics.split(/\r?\n/);
            let useChunk = autoChunk && allLines.length > AI_CHUNK_LINE_THRESHOLD;

            const runOneStream = async (promptText, statusLabel, previewPrefix, accTokensRef) => {
                setAILiveStatus(statusLabel, 'run');
                let segmentText = '';
                const result = await streamChatCompletion({
                    baseUrl: settings.baseUrl,
                    apiKey: settings.apiKey,
                    model: settings.model,
                    messages: [systemMsg, { role: 'user', content: promptText }],
                    signal: controller.signal,
                    onDelta: (_delta, fullSoFar) => {
                        segmentText = fullSoFar;
                        const display = (previewPrefix || '') + fullSoFar;
                        if (outEl) {
                            outEl.textContent = display;
                            outEl.scrollTop = outEl.scrollHeight;
                        }
                        const live = parseAILiveOutputToTokens(fullSoFar).tokens;
                        const total = (accTokensRef ? accTokensRef.length : 0) + live.length;
                        if (countEl) countEl.textContent = `${total} 語素 · ${display.length} 字`;
                        setAILiveStatus(`${statusLabel} · 本段約 ${live.length} 語素`, 'run');
                    }
                });
                const text = result.text || segmentText || '';
                return { text, finishReason: result.finishReason };
            };

            try {
                const allTokens = [];
                let truncatedHint = false;
                let previewLog = '';

                // 若未勾選分段但仍很長，仍建議分段
                if (!useChunk && allLines.length > AI_CHUNK_LINE_THRESHOLD) {
                    // 整首 JSONL 一次
                }

                if (!useChunk) {
                    const promptText = buildAILivePrompt({ forceLineMarks: true });
                    const { text, finishReason } = await runOneStream(promptText, '整首 JSONL 分析', '', null);
                    if (outEl && !outEl.textContent) outEl.textContent = text;
                    previewLog = text;

                    const parsed = parseAILiveOutputToTokens(text);
                    allTokens.push(...parsed.tokens);

                    if (finishReason === 'length' || (parsed.tokens.length === 0 && text.trim())) {
                        if (autoChunk && allLines.length > 1) {
                            truncatedHint = true;
                            allTokens.length = 0;
                            setAILiveStatus('整首可能被截斷或格式不穩，改分段 JSONL…', 'run');
                            showToast('改以分段 JSONL 重跑');
                            useChunk = true;
                        } else if (parsed.tokens.length === 0) {
                            throw new Error(
                                '無法從輸出解析語素。請確認模型有依 JSONL（每行 {"S":…,"M":…}）輸出，或勾選自動分段後重試。'
                            );
                        }
                    }
                }

                if (useChunk) {
                    allTokens.length = 0;
                    previewLog = '';
                    const chunks = [];
                    for (let start = 0; start < allLines.length; start += AI_CHUNK_LINES) {
                        chunks.push({ start, end: Math.min(start + AI_CHUNK_LINES, allLines.length) });
                    }

                    for (let ci = 0; ci < chunks.length; ci++) {
                        if (controller.signal.aborted) throw new DOMException('Aborted', 'AbortError');
                        const { start, end } = chunks[ci];
                        const chunkLyrics = allLines.slice(start, end).join('\n');
                        const promptText = buildAILivePrompt({
                            lyrics: chunkLyrics,
                            lineOffset: start,
                            forceLineMarks: true,
                            chunkNote: `第 ${ci + 1}/${chunks.length} 段，只分析 L${start + 1}–L${end}，只輸出這些行的 JSONL。`
                        });
                        const label = `分段 ${ci + 1}/${chunks.length}（行 ${start + 1}–${end}）`;
                        previewLog += (previewLog ? '\n\n' : '') + `// ===== ${label} =====\n`;
                        const { text, finishReason } = await runOneStream(promptText, label, previewLog, allTokens);

                        const parsed = parseAILiveOutputToTokens(text);
                        if (parsed.tokens.length === 0 && text.trim()) {
                            // 半截仍盡力從完整行取；若全無才報錯
                            if (finishReason === 'length') {
                                setAILiveStatus(`${label} 輸出可能截斷；保留已解析語素並繼續…`, 'run');
                            } else {
                                console.warn('[AI Live] empty parse for chunk', ci + 1, text.slice(0, 200));
                            }
                        }
                        allTokens.push(...parsed.tokens);
                        previewLog += text;
                        if (outEl) {
                            outEl.textContent = previewLog + `\n\n// --- 已累計 ${allTokens.length} 個語素 ---`;
                            outEl.scrollTop = outEl.scrollHeight;
                        }
                        if (countEl) countEl.textContent = `${allTokens.length} 語素`;
                    }
                }

                _aiLiveCollectedTokens = allTokens;
                const finalPayload = JSON.stringify({
                    verbaCarminisImport: 'v1',
                    tokens: allTokens
                }, null, 2);
                if (outEl) outEl.textContent = finalPayload;
                if (countEl) countEl.textContent = `${allTokens.length} 語素`;

                if (allTokens.length === 0) {
                    throw new Error('沒有解析到任何語素。可查看預覽或改用「從 AI 導入」。');
                }

                setAILiveStatus(`解析完成（${allTokens.length} 語素），正在寫入歌詞本…`, 'run');
                if (importBtn) importBtn.classList.remove('hidden');

                const autoOk = importAILiveResult(true);
                if (autoOk) {
                    setAILiveStatus(
                        `已寫入歌詞本：${allTokens.length} 個語素` +
                        (useChunk || truncatedHint ? `（分段，共 ${allLines.length} 行）` : ''),
                        'ok'
                    );
                    showToast(`AI 已分析並寫入 ${allTokens.length} 個語素`);
                } else {
                    setAILiveStatus('已解析語素，但寫入失敗。可按「導入目前結果」重試。', 'error');
                }
            } catch (err) {
                if (err && err.name === 'AbortError') {
                    setAILiveStatus('已取消', 'error');
                } else {
                    setAILiveStatus((err && err.message) || String(err), 'error');
                    console.error('[AI Live]', err);
                    if (importBtn) importBtn.classList.remove('hidden');
                }
            } finally {
                if (_aiStreamAbort === controller) _aiStreamAbort = null;
                if (startBtn) startBtn.disabled = false;
                if (cancelBtn) cancelBtn.classList.add('hidden');
            }
        }

        /**
         * @param {boolean} silent 自動導入時少彈 alert
         * @returns {boolean}
         */
        function importAILiveResult(silent) {
            let tokens = (_aiLiveCollectedTokens && _aiLiveCollectedTokens.length)
                ? _aiLiveCollectedTokens.slice()
                : null;

            if (!tokens || !tokens.length) {
                const outEl = document.getElementById('ai-live-stream-out');
                const raw = outEl ? (outEl.textContent || '') : '';
                if (!raw.trim() || raw.trim() === '等待開始…') {
                    if (!silent) alert('尚無 AI 輸出可導入');
                    return false;
                }
                const parsed = parseAILiveOutputToTokens(raw);
                tokens = parsed.tokens;
            }

            if (!tokens || !tokens.length) {
                if (!silent) alert('無法解析出語素。請確認輸出為 JSONL（每行 {"S":…,"M":…}）。');
                return false;
            }

            const jsonText = JSON.stringify({
                verbaCarminisImport: 'v1',
                tokens
            });

            const modeRadio = document.querySelector('input[name="ai-live-import-mode"]:checked');
            const mode = modeRadio ? modeRadio.value : 'full';
            const success = importFromAITropical(jsonText, mode);
            if (success) {
                if (!silent) {
                    showToast(`已寫入 ${tokens.length} 個語素到歌詞本`);
                    closeAILiveModal();
                }
            }
            return success;
        }

        function updateAIImportPreviewTropical(text) {
            const previewBox = document.getElementById('ai-import-preview');
            const content = document.getElementById('ai-import-preview-content');
            if (!previewBox || !content) return;

            try {
                const data = JSON.parse(text.trim());
                let tokens = [];
                
                if (Array.isArray(data)) tokens = data;
                else if (data.tokens && Array.isArray(data.tokens)) tokens = data.tokens;
                else if (data.verbaCarminisImport && data.tokens) tokens = data.tokens;

                if (tokens.length === 0) {
                    previewBox.classList.add('hidden');
                    return;
                }

                previewBox.classList.remove('hidden');
                content.innerHTML = tokens.slice(0, 8).map(t => {
                    const s = (typeof t === 'object') ? (t.surface || t.S || t.value || t.token || '') : t;
                    const m = (typeof t === 'object') ? (t.meaning || t.M || t.translation || t.gloss || '') : '';
                    return `<div><span class="text-teal-700">${s}</span> ${m ? '→ ' + m : ''}</div>`;
                }).join('');
                if (tokens.length > 8) {
                    content.innerHTML += `<div class="text-slate-400 mt-1">... 還有 ${tokens.length - 8} 個語素</div>`;
                }
            } catch (e) {
                previewBox.classList.add('hidden');
            }
        }

        function validateAIImportInputTropical() {
            const ta = document.getElementById('ai-import-textarea');
            if (!ta) return;

            try {
                const data = JSON.parse(ta.value.trim());
                let tokenCount = 0;

                if (Array.isArray(data)) tokenCount = data.length;
                else if (data.tokens) tokenCount = data.tokens.length;
                else if (data.verbaCarminisImport === 'v1' && data.tokens) tokenCount = data.tokens.length;

                if (tokenCount === 0) throw new Error('找不到 tokens');

                showToast(`格式正確！共 ${tokenCount} 個語素`);
            } catch (e) {
                alert('JSON 格式有誤，請檢查：\n' + e.message);
            }
        }

        function performAIImportTropical() {
            const ta = document.getElementById('ai-import-textarea');
            if (!ta || !currentBook) return;

            const text = ta.value.trim();
            if (!text) {
                alert('請先貼上 AI 輸出的 JSON，或選擇 .json 檔案');
                return;
            }

            const modeRadio = document.querySelector('input[name="import-mode-tropical"]:checked');
            const mode = modeRadio ? modeRadio.value : 'full';

            const success = importFromAITropical(text, mode);
            if (success) {
                document.getElementById('ai-import-modal').remove();
            }
        }

        /**
         * 核心功能：從 AI JSON 導入語素
         * - 寫入 AI 提供的細拆語素 + 意思/翻譯/解釋等
         * - 若 AI 輸出包含 "line" 欄位（新提示詞推薦用法），會用 buildStructuredTokensFromLines 精準重建分行 + break
         * - 否則退回 realignFlatTokensToRawLines（相容舊 JSON）
         */
        function importFromAITropical(jsonText, mode = 'full') {
            if (!currentBook) return false;

            let data;
            try {
                data = JSON.parse(jsonText.trim());
            } catch (e) {
                alert('無法解析 JSON，請確認格式正確');
                return false;
            }

            let importedTokens = [];
            if (Array.isArray(data)) {
                importedTokens = data;
            } else if (data.tokens && Array.isArray(data.tokens)) {
                importedTokens = data.tokens;
            } else if (data.verbaCarminisImport === 'v1' && Array.isArray(data.tokens)) {
                importedTokens = data.tokens;
            }

            if (importedTokens.length === 0) {
                alert('JSON 裡沒有找到有效的 tokens 陣列');
                return false;
            }

            const bookLang = currentBook ? (currentBook.language || 'ja') : 'ja';
            const normalized = importedTokens.map(t => {
                if (typeof t === 'string') {
                    return { surface: t, meaning: '', pos: '', line: null };
                }
                // 相容完整欄位名 + 單字母縮寫（S/M/P/L/F/E/H/B/I）
                const ex = (typeof expandCompactToken === 'function') ? expandCompactToken(t) : null;
                if (ex) {
                    return {
                        surface: ex.surface,
                        meaning: ex.meaning,
                        explanation: ex.explanation,
                        pos: normalizePOS(ex.pos || t.pos || t.P || t.partOfSpeech || t['詞性'] || '', bookLang),
                        furigana: ex.furigana,
                        note: ex.note || t.note || t.筆記 || '',
                        phonetic: ex.phonetic,
                        lemma: ex.lemma,
                        inflection: ex.inflection,
                        line: ex.line
                    };
                }
                const rawPos = t.pos || t.P || t.partOfSpeech || t['詞性'] || '';
                return {
                    surface: t.surface || t.S || t.value || t.token || '',
                    meaning: t.meaning || t.M || t.translation || t.gloss || '',
                    explanation: t.explanation || t.E || '',
                    pos: normalizePOS(rawPos, bookLang),
                    furigana: t.furigana || t.F || t.kana || '',
                    note: t.note || t.N || t.筆記 || '',
                    phonetic: t.phonetic || t.H || t.ipa || t.pronunciation || t['音標'] || t.pron || '',
                    lemma: t.lemma || t.B || t.originalForm || t.base || t['原形'] || '',
                    inflection: t.inflection || t.I || t.changes || t.rule || t.applied || t['變化規則'] || t.inflect || '',
                    line: t.line != null ? t.line : (t.L != null ? t.L : (t.lineNumber != null ? t.lineNumber : (t['行'] != null ? t['行'] : null)))
                };
            }).filter(t => t.surface && t.surface.trim());

            if (normalized.length === 0) {
                alert('沒有有效的語素 surface');
                return false;
            }

            const oldAnnotations = currentBook.annotations || {};
            const newAnnotations = {};

            normalized.forEach(t => {
                const key = t.surface;
                const existing = oldAnnotations[key] || {};

                if (mode === 'full') {
                    newAnnotations[key] = {
                        meaning: t.meaning || '',
                        translation: t.meaning || '',
                        explanation: t.explanation || '',
                        pos: t.pos || '',
                        furigana: t.furigana || '',
                        note: t.note || '',
                        // French fields (ride along for fr books; harmless for ja/ko)
                        phonetic: t.phonetic || '',
                        lemma: (currentBook.language === 'ja' ? sanitizeJaLemma(t.lemma || '') : (t.lemma || '')),
                        inflection: t.inflection || ''
                    };
                } else {
                    newAnnotations[key] = {
                        ...existing,
                        meaning: existing.meaning || t.meaning || '',
                        translation: existing.translation || existing.meaning || t.meaning || '',
                        explanation: existing.explanation || t.explanation || '',
                        pos: existing.pos || t.pos || '',
                        furigana: existing.furigana || t.furigana || '',
                        phonetic: existing.phonetic || t.phonetic || '',
                        lemma: (currentBook.language === 'ja' ? sanitizeJaLemma(existing.lemma || t.lemma || '') : (existing.lemma || t.lemma || '')),
                        inflection: existing.inflection || t.inflection || ''
                    };
                }
            });

            currentBook.annotations = newAnnotations;
            currentBook.customMerges = [];
            currentBook.customSplits = {};

            normalizeAllKoreanPOS(); // in case AI still leaked any raw POS despite prompt+map in import

            if (data.rawLyrics) {
                currentBook.rawLyrics = data.rawLyrics;
                const input = document.getElementById('lyrics-input');
                if (input) input.value = data.rawLyrics;
            }

            saveBooks();

            // 決定最終 tokens：若 AI 提供 line 資訊則優先使用 buildStructuredTokensFromLines（精準保留分行，含空白行處理）
            // 否則若有 rawLyrics 分行則退回 realign heuristic（相容舊 JSON），否則維持平坦
            let finalTokens;
            // Attach .annotation from AI per-item data so same-surface different senses survive (V0.85 / V0.88)
            const surfaceTokensForFallback = normalized.map(t => {
                const tok = { type: 'text', value: t.surface };
                const hasAnnData = t.meaning || t.explanation || t.pos || t.furigana || t.note || t.phonetic || t.lemma || t.inflection;
                if (hasAnnData) {
                    tok.annotation = {
                        meaning: t.meaning || '',
                        translation: t.meaning || '',
                        explanation: t.explanation || '',
                        pos: t.pos || '',
                        furigana: t.furigana || '',
                        note: t.note || '',
                        phonetic: t.phonetic || '',
                        lemma: (currentBook && currentBook.language === 'ja' ? sanitizeJaLemma(t.lemma || '') : (t.lemma || '')),
                        inflection: t.inflection || ''
                    };
                    // AI-provided per-token data: do NOT set _userCustomized (only user edits/forks do; prevents all "此處專屬" spam after full FR/KR import)
                }
                return tok;
            });
            if (currentBook.rawLyrics && currentBook.rawLyrics.includes('\n')) {
                const hasLineInfo = normalized.some(t => t.line != null);
                if (hasLineInfo) {
                    finalTokens = buildStructuredTokensFromLines(normalized, currentBook.rawLyrics);
                } else {
                    finalTokens = realignFlatTokensToRawLines(surfaceTokensForFallback, currentBook.rawLyrics);
                }
            } else {
                finalTokens = surfaceTokensForFallback;
            }
            currentBook.tokens = finalTokens;

            processLyrics(true, true);

            showToast(`成功導入 ${normalized.length} 個語素（${mode === 'full' ? '完全覆蓋' : '僅替換排序'}）`);
            return true;
        }

        function initializeTailwind() {
            // Already using CDN
        }

        async function init() {
            initMobileLayout();
            try {
                await loadBooks();
            } catch (e) {
                console.error('[Init] loadBooks failed:', e);
                books = books || [];
                showToast('載入歌詞本時發生錯誤，請嘗試從備份匯入');
            }
            normalizeAllKoreanPOS(); // ensure clean even for in-memory from previous session state
            currentSplittingWord = null;
            correctionSelected.clear();
            await initBookshelfBackgroundCache();
            applyTheme(currentTheme);   // 套用使用者上次選擇的顏色風格
            applyMorphemeSize(getMorphemeSizeScale());  // 套用語素大小設定
            applyInfoScale(getInfoScale());  // 套用標註資訊大小（讀音/翻譯/解釋等）
            requestBookshelfEntranceAnim();
            renderBookshelf();
            applyBookshelfBackground();
            initializeTailwind();

            // Keyboard shortcut
            document.addEventListener('keydown', (e) => {
                // Ctrl/Cmd + Enter: process lyrics
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    const input = document.getElementById('lyrics-input');
                    if (document.activeElement === input && currentBook) {
                        e.preventDefault();
                        processLyrics(false, true);  // preserve existing tokens (AI segmentation etc.)
                    }
                }

                // Enter: merge selected morphemes in correction merge mode (very useful!)
                if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.metaKey) {
                    if (correctionMode && correctionSubMode === 'merge' && correctionSelected.size >= 2) {
                        const active = document.activeElement;
                        // Don't interfere if user is typing in an input/textarea
                        if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable)) {
                            return;
                        }
                        e.preventDefault();
                        mergeSelectedMorphemes();
                    }
                }
            });

            // Auto-save title on blur
            const titleInput = document.getElementById('book-title-input');
            if (titleInput) {
                titleInput.addEventListener('blur', saveCurrentBook);
            }

            // 關閉／重整前盡量刷寫尚未 debounce 完成的儲存
            window.addEventListener('beforeunload', () => {
                if (_booksSaveTimer) {
                    clearTimeout(_booksSaveTimer);
                    _booksSaveTimer = null;
                    // beforeunload 內無法可靠 await；同步觸發 write via sendBeacon 不可用，改用同步 IDB 不可行
                    // 依賴 debounce 通常 300ms 內完成；關鍵路徑已用 saveBooks(true)
                    try { persistBooksNow(); } catch (_) {}
                }
            });

            console.log(
                `%c[VERBA CAMINIS ${APP_VERSION}] 初始化完成 — books=${books.length} storage=${_booksStorageBackend}`,
                'color:#14B8A6'
            );
        }

        window.onload = init;
    </script>
</body>
</html>
