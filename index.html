        // Japanese-specific POS options (when currentBook.language === 'ja')
        const JA_POS_OPTIONS = [
            "動詞", "名詞", "助詞", "副詞", "形容詞", 
            "連體詞", "接續詞", "感動詞", "助動詞"
        ];

        // Korean-specific POS options (V0.85+; 接續詞 added for AI consistency with prompt examples)
        const KR_POS_OPTIONS = ["名詞", "動詞", "形容詞", "冠形詞", "副詞", "助詞", "感嘆詞", "接續詞", "其他"];

        const FR_POS_OPTIONS = ["名詞", "限定詞", "形容詞", "代詞", "動詞", "副詞", "介詞", "連接詞", "感嘆詞", "其他"];

        const DEFAULT_POS_OPTIONS = ["動詞", "名詞", "助詞", "副詞", "形容詞", "助動詞", "其他"];

        // Master list of all configured/known POS (source of truth for dictionary pills, chips, and to reject rogue values)
        const ALL_KNOWN_POS = Array.from(new Set([
            ...JA_POS_OPTIONS,
            ...KR_POS_OPTIONS,
            ...FR_POS_OPTIONS,
            ...DEFAULT_POS_OPTIONS,
            '其他'
        ]));

        // Korean POS normalization map: map common Korean terms from AI to the app's Chinese POS
        const KO_POS_MAP = {
            '동사': '動詞',
            '접속사': '接續詞',
            '접속詞': '接續詞',
            '연결사': '接續詞',
            '접속어': '接續詞',
            '형용사': '形容詞',
            '부사': '副詞',
            '조사': '助詞',
            '명사': '名詞',
            '관형사': '冠形詞',
            '감탄사': '感嘆詞',
            '기타': '其他',
            '수사': '名詞',
            '대명사': '代詞',
            '보조동사': '動詞',
            '동사': '動詞', // safety
            '접속사': '接續詞'
        };

        function normalizePOS(pos, lang) {
            if (!pos) return '';
            const trimmed = pos.trim();
            if (lang === 'ko' && KO_POS_MAP[trimmed]) {
                return KO_POS_MAP[trimmed];
            }
            // Accept if already a known configured Chinese POS (from any lang list)
            if (ALL_KNOWN_POS.includes(trimmed)) {
                return trimmed;
            }
            // For Korean data, if still looks like Hangul (unmapped variant), force to '其他' to avoid rogue tags in dictionary
            if (lang === 'ko' && /[가-힣]/.test(trimmed)) {
                return '其他';
            }
            // for other langs, could add more maps if needed (e.g. English -> Chinese)
            return trimmed || '其他';
        }

        function normalizeAllKoreanPOS() {
            // Run on in-memory books (and persist if any fixed). Called at init + after import + before dict render to clean legacy raw Korean POS without requiring page reload.
            let changed = false;
            books.forEach(book => {
                if (book.language === 'ko' && book.annotations) {
                    Object.keys(book.annotations).forEach(key => {
                        const ann = book.annotations[key];
                        if (ann && ann.pos) {
                            const normalized = normalizePOS(ann.pos, 'ko');
                            if (normalized !== ann.pos) {
                                ann.pos = normalized;
                                changed = true;
                            }
                        }
                    });
                }
            });
            if (changed) {
                saveBooks();
            }
            return changed;
        }

        function getPOSOptionsForBook() {
            if (currentBook && currentBook.language === 'ja') {
                return JA_POS_OPTIONS;
            }
            if (currentBook && currentBook.language === 'ko') {
                return KR_POS_OPTIONS;
            }
            if (currentBook && currentBook.language === 'fr') {
                return FR_POS_OPTIONS;
            }
            return DEFAULT_POS_OPTIONS;
        }

        async function loadBooks() {
            let idbBooks = null;
            try {
                idbBooks = await idbGetAllBooks();
            } catch (e) {
                console.warn('[Books] IndexedDB read failed:', e);
            }

            let lsBooks = null;
            const lsRaw = localStorage.getItem(STORAGE_KEY);
            if (lsRaw) {
                try {
                    lsBooks = JSON.parse(lsRaw);
                } catch (e) {
                    console.error('[Books] localStorage parse failed:', e);
                    showToast('本機歌詞本資料損壞，請改用備份檔匯入');
                }
            }

            const useIdbFlag = localStorage.getItem(BOOKS_IDB_FLAG) === '1';
            const idbIsArray = Array.isArray(idbBooks);
            const idbHasData = idbIsArray && idbBooks.length > 0;
            const lsHasData = Array.isArray(lsBooks) && lsBooks.length > 0;

            if (useIdbFlag && idbIsArray) {
                // 已升級：以 IndexedDB 為準（含空書架）
                books = idbBooks;
                _booksStorageBackend = 'idb';
                if (lsRaw) {
                    try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
                }
            } else if (idbHasData) {
                books = idbBooks;
                _booksStorageBackend = 'idb';
                try { localStorage.setItem(BOOKS_IDB_FLAG, '1'); } catch (_) {}
                if (lsRaw) {
                    try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
                }
            } else if (lsHasData) {
                // 首次遷移：localStorage → IndexedDB
                books = lsBooks;
                try {
                    await idbSetAllBooks(books);
                    localStorage.setItem(BOOKS_IDB_FLAG, '1');
                    localStorage.removeItem(STORAGE_KEY);
                    _booksStorageBackend = 'idb';
                    console.log('[Books] Migrated localStorage → IndexedDB, count:', books.length);
                    showToast(`儲存已升級為擴充模式（目前 ${books.length} 本，可放更多歌詞本）`);
                } catch (e) {
                    console.error('[Books] Migration failed, staying on localStorage:', e);
                    _booksStorageBackend = 'localStorage';
                    showToast('無法升級至擴充儲存，請先「匯出所有資料」備份後再試');
                }
            } else if (idbIsArray) {
                books = idbBooks;
                _booksStorageBackend = 'idb';
                try { localStorage.setItem(BOOKS_IDB_FLAG, '1'); } catch (_) {}
            } else {
                books = [];
                // 優先嘗試建立 IDB 後端
                try {
                    await idbSetAllBooks([]);
                    localStorage.setItem(BOOKS_IDB_FLAG, '1');
                    _booksStorageBackend = 'idb';
                } catch (e) {
                    _booksStorageBackend = 'localStorage';
                }
            }

            // Normalize Korean POS so dictionary/panels never show raw like 동사/접속詞
            normalizeAllKoreanPOS();
        }

        /** 立即寫入 IndexedDB（失敗時可回退 localStorage，並顯示 toast） */
        async function persistBooksNow() {
            try {
                await idbSetAllBooks(books);
                try {
                    localStorage.setItem(BOOKS_IDB_FLAG, '1');
                    localStorage.removeItem(STORAGE_KEY);
                } catch (_) {}
                _booksStorageBackend = 'idb';
                return true;
            } catch (idbErr) {
                console.warn('[Books] IndexedDB save failed, trying localStorage:', idbErr);
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
                    _booksStorageBackend = 'localStorage';
                    return true;
                } catch (lsErr) {
                    console.error('[Books] All storage backends failed:', lsErr || idbErr);
                    const isQuota = (lsErr && (lsErr.name === 'QuotaExceededError' || lsErr.code === 22))
                        || (idbErr && (idbErr.name === 'QuotaExceededError' || /quota/i.test(String(idbErr))));
                    showToast(isQuota
                        ? '儲存空間不足。請先「匯出所有資料」備份，或刪除部分歌詞本／封面後再試'
                        : '儲存失敗：瀏覽器儲存不可用，請先匯出備份');
                    return false;
                }
            }
        }

        /**
         * 持久化歌詞本。預設 300ms debounce（編輯時合併寫入）；
         * saveBooks(true) 或 saveBooks({ flush: true }) 立即寫入。
         * 回傳 Promise，方便 create / import 等關鍵路徑 await。
         */
        function saveBooks(opts) {
            const flush = opts === true || (opts && opts.flush === true);

            if (flush) {
                if (_booksSaveTimer) {
                    clearTimeout(_booksSaveTimer);
                    _booksSaveTimer = null;
                }
                _booksSaveChain = _booksSaveChain.then(() => persistBooksNow()).catch((e) => {
                    console.error('[Books] flush save error:', e);
                    return false;
                });
                return _booksSaveChain;
            }

            if (_booksSaveTimer) clearTimeout(_booksSaveTimer);
            return new Promise((resolve) => {
                _booksSaveTimer = setTimeout(() => {
                    _booksSaveTimer = null;
                    _booksSaveChain = _booksSaveChain.then(() => persistBooksNow()).then(resolve).catch((e) => {
                        console.error('[Books] debounced save error:', e);
                        resolve(false);
                    });
                }, 300);
            });
        }

        function renderBookshelf() {
            const grid = document.getElementById('books-grid');
            const empty = document.getElementById('empty-state');
            const noResults = document.getElementById('bookshelf-no-results');
            const animateEntrance = bookshelfEntranceAnim;
            bookshelfEntranceAnim = false;
            grid.innerHTML = '';

            // 渲染語言標籤（每次重繪以更新 active 狀態）
            renderBookshelfLangPills();

            // 同步搜尋輸入值到 state
            const searchEl = document.getElementById('bookshelf-search');
            if (searchEl) {
                bookshelfFilters.search = searchEl.value || '';
            }

            if (books.length === 0) {
                empty.classList.remove('hidden');
                grid.classList.add('hidden');
                if (noResults) noResults.classList.add('hidden');
                return;
            } else {
                empty.classList.add('hidden');
            }

            // 套用篩選
            const q = (bookshelfFilters.search || '').toLowerCase().trim();
            const activeLangs = bookshelfFilters.languages;

            let filteredBooks = books.filter(book => {
                const lang = book.language || 'ja';
                if (activeLangs.size > 0 && !activeLangs.has(lang)) {
                    return false;
                }
                if (q) {
                    const hay = `${book.title || ''} ${book.artist || ''} ${book.rawLyrics || ''}`.toLowerCase();
                    if (!hay.includes(q)) return false;
                }
                return true;
            });

            filteredBooks.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

            if (filteredBooks.length === 0) {
                grid.classList.add('hidden');
                if (noResults) noResults.classList.remove('hidden');
                return;
            } else {
                if (noResults) noResults.classList.add('hidden');
                grid.classList.remove('hidden');
            }

            filteredBooks.forEach((book, index) => {
                const annCount = Object.keys(book.annotations || {}).length;
                const langLabel = book.language === 'ja' ? '日語' : book.language === 'ko' ? '韓語' : book.language === 'fr' ? '法語' : '日語';
                const artist = book.artist ? book.artist : '';

                const slot = document.createElement('div');
                slot.className = 'book-card-slot';
                const card = document.createElement('div');
                card.className = 'book-card flex flex-col';
                if (animateEntrance) {
                    slot.classList.add('book-card-enter');
                    slot.style.animationDelay = `${Math.min(index * 65, 650)}ms`;
                    slot.addEventListener('animationend', (e) => {
                        if (e.animationName !== 'book-card-enter') return;
                        slot.classList.remove('book-card-enter');
                        slot.classList.add('book-card-enter-done');
                        slot.style.removeProperty('animation-delay');
                    }, { once: true });
                } else {
                    slot.classList.add('book-card-enter-done');
                }

                const titleBlockHTML = `
                    <div class="cover-bottom-fade" aria-hidden="true"></div>
                    <div class="cover-title-block">
                        <div class="cover-title">${book.title}</div>
                        ${artist ? `<div class="cover-artist">${artist}</div>` : ''}
                    </div>
                `;

                if (book.cover) {
                    card.innerHTML = `
                        <div class="cover-wrap">
                            <img src="${book.cover}" class="cover-art" alt="${book.title} 封面">
                            <div class="cover-glass-dome" aria-hidden="true"></div>
                            <div class="cover-glass-rim" aria-hidden="true"></div>
                            ${titleBlockHTML}
                            <span class="book-lang-badge">${langLabel}</span>
                        </div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="no-cover">
                            <i class="fa-solid fa-compact-disc text-4xl text-slate-500 relative z-[1]"></i>
                            <div class="cover-glass-dome" aria-hidden="true"></div>
                            <div class="cover-glass-rim" aria-hidden="true"></div>
                            ${titleBlockHTML}
                            <span class="book-lang-badge">${langLabel}</span>
                        </div>
                    `;
                }

                slot.onclick = () => openBook(book.id);
                slot.appendChild(card);
                grid.appendChild(slot);
            });

            // Cards already have smooth hover transitions via CSS group classes
        }

        // V0.98+: 首頁歌詞本的語言標籤篩選 + 搜尋 相關函式
        function renderBookshelfLangPills() {
            const container = document.getElementById('bookshelf-lang-pills');
            if (!container) return;

            const options = [
                { key: 'ja', label: '日語' },
                { key: 'ko', label: '韓語' },
                { key: 'fr', label: '法語' }
            ];

            container.innerHTML = options.map(opt => {
                const active = bookshelfFilters.languages.has(opt.key);
                return `<button onclick="toggleBookshelfLang('${opt.key}')"
                               class="bookshelf-lang-pill${active ? ' active' : ''}">
                            ${opt.label}
                        </button>`;
            }).join('');
        }

        function toggleBookshelfLang(lang) {
            if (bookshelfFilters.languages.has(lang)) {
                bookshelfFilters.languages.delete(lang);
            } else {
                bookshelfFilters.languages.add(lang);
            }
            renderBookshelf();
        }

        function clearBookshelfLangFilters() {
            bookshelfFilters.languages = new Set(['ja', 'ko', 'fr']);
            renderBookshelf();
        }

            bookshelfFilters.search = '';
            bookshelfFilters.languages = new Set(['ja', 'ko', 'fr']);
            const searchEl = document.getElementById('bookshelf-search');
            if (searchEl) searchEl.value = '';
            renderBookshelf();
        }

        function setupCoverUpload() {
            const area = document.getElementById('cover-upload-area');
            const input = document.getElementById('cover-input');
            const placeholder = document.getElementById('cover-placeholder');
            const preview = document.getElementById('cover-preview');
            const previewImg = document.getElementById('cover-preview-img');

            if (!area || !input) return;

            // Click to open file picker
            area.onclick = () => input.click();

            // Drag & drop
            area.ondragover = (e) => {
                e.preventDefault();
                area.classList.add('border-[#069494]', 'bg-[#E6F7F7]');
            };
            area.ondragleave = () => {
                area.classList.remove('border-[#069494]', 'bg-[#E6F7F7]');
            };
            area.ondrop = async (e) => {
                e.preventDefault();
                area.classList.remove('border-[#069494]', 'bg-[#E6F7F7]');
                const file = e.dataTransfer.files[0];
                if (file) await handleCoverFile(file, preview, previewImg, placeholder);
            };

            // File input change
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) await handleCoverFile(file, preview, previewImg, placeholder);
            };
        }

        async function handleCoverFile(file, previewEl, imgEl, placeholderEl) {
            // V0.98+: 改用裁切 modal，讓使用者自己調整邊框/裁切區域
            try {
                showCoverCropModal(file, (dataURL) => {
                    if (!dataURL) return;
                    pendingBookCover = dataURL;
                    imgEl.src = dataURL;
                    placeholderEl.classList.add('hidden');
                    previewEl.classList.remove('hidden');
                });
            } catch (err) {
                alert(err.message || '圖片處理失敗');
            }
        }

        function removePendingCover() {
            pendingBookCover = null;
            const placeholder = document.getElementById('cover-placeholder');
            const preview = document.getElementById('cover-preview');
            if (placeholder) placeholder.classList.remove('hidden');
            if (preview) preview.classList.add('hidden');
        }

        function selectLanguageInModal(btn, lang) {
            // Deselect all
            document.querySelectorAll('#lang-selector-modal .lang-btn').forEach(b => {
                b.classList.remove('border-[#166534]', 'bg-[#069494]/10', 'text-[#069494]');

            btn.classList.remove('border-slate-200', 'hover:bg-slate-50');
            btn.classList.add('border-[#166534]', 'bg-[#069494]/10', 'text-[#069494]');

            pendingBookLanguage = lang;
        }

        // ==================== Image Cover Helper (含 V0.98+ 裁切功能) ====================
        function resizeImageToDataURL(file, maxWidth = COVER_MAX_DIM, maxHeight = COVER_MAX_DIM, quality = COVER_JPEG_QUALITY) {
            return new Promise((resolve, reject) => {
                if (!file.type.startsWith('image/')) {
                    reject(new Error('請上傳圖片檔案'));
                    return;
                }
                if (file.size > 8 * 1024 * 1024) {
                    reject(new Error('圖片太大，請選擇小於 8MB 的圖片'));
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        let { width, height } = img;
                        if (width > maxWidth || height > maxHeight) {
                            const ratio = Math.min(maxWidth / width, maxHeight / height);
                            width = Math.round(width * ratio);
                            height = Math.round(height * ratio);
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // Use JPEG for better compression on photos/covers
                        const dataURL = canvas.toDataURL('image/jpeg', quality);
                        resolve(dataURL);
                    };
                    img.onerror = () => reject(new Error('圖片讀取失敗'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('檔案讀取失敗'));
                reader.readAsDataURL(file);
            });
        }

        function resizeDataURLToDataURL(dataURL, maxWidth = 1920, maxHeight = 1080, quality = 0.85) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    let { width, height } = img;
                    if (width > maxWidth || height > maxHeight) {
                        const ratio = Math.min(maxWidth / width, maxHeight / height);
                        width = Math.round(width * ratio);
                        height = Math.round(height * ratio);
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.onerror = () => reject(new Error('圖片讀取失敗'));
                img.src = dataURL;
            });
        }

        // V0.98+: 通用裁切 modal（封面、首頁背景等）
        // source: File 或 data URL 字串
        function showImageCropModal(source, onConfirm, options = {}) {
            const opts = {
                title: '裁切圖片',
                subtitle: '拖曳選取框或四角調整邊框',
                defaultAspect: 4 / 3,
                defaultAspectButton: '1.333',
                previewW: 160,
                previewH: 120,
                outputMax: 800,
                outputQuality: 0.82,
                fullResizeMaxW: 600,
                fullResizeMaxH: 600,
                fullResizeQuality: 0.82,
                confirmLabel: '確認裁切並使用',
                ...options
            };

            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-[400] p-4';
            modal.innerHTML = `
                <div onclick="event.target.remove()" class="absolute inset-0"></div>
                <div onclick="event.stopImmediatePropagation()" 
                     class="relative bg-white rounded-3xl w-full max-w-[820px] shadow-2xl overflow-hidden flex flex-col">
                    
                    <div class="px-6 py-4 border-b flex items-center justify-between bg-slate-50">
                        <div>
                            <div class="font-semibold tracking-tight">${opts.title}</div>
                            <div class="text-xs text-slate-500">${opts.subtitle}</div>
                        </div>
                        <button onclick="this.closest('.fixed').remove()" 
                                class="text-slate-400 hover:text-slate-600 px-2">✕</button>
                    </div>

                    <div class="p-6 flex flex-col lg:flex-row gap-6">
                        <div class="flex-1">
                            <div id="crop-container" class="cover-crop-container mx-auto" style="max-height: 420px;">
                                <img id="crop-src-img" class="max-w-full" style="max-height: 400px;" />
                                <div id="crop-box" class="crop-box" style="display:none;">
                                    <div class="crop-handle nw" data-handle="nw"></div>
                                    <div class="crop-handle ne" data-handle="ne"></div>
                                    <div class="crop-handle sw" data-handle="sw"></div>
                                    <div class="crop-handle se" data-handle="se"></div>
                                </div>
                            </div>
                            <div class="mt-2 text-[10px] text-slate-400 text-center">點擊圖片空白處可重新選取區域</div>
                        </div>

                        <div class="w-full lg:w-52 flex-shrink-0 space-y-4">
                            <div>
                                <div class="text-xs uppercase tracking-widest text-slate-500 mb-1.5">即時預覽</div>
                                <div class="border border-slate-200 rounded-xl overflow-hidden bg-slate-100" style="width:${opts.previewW}px; height:${opts.previewH}px;">
                                    <canvas id="crop-preview-canvas" width="${opts.previewW}" height="${opts.previewH}" class="w-full h-full object-contain"></canvas>
                                </div>
                            </div>

                            <div>
                                <div class="text-xs uppercase tracking-widest text-slate-500 mb-1.5">比例鎖定</div>
                                <div class="grid grid-cols-4 gap-1 text-[10px]">
                                    <button data-aspect="0" class="crop-aspect-btn px-2 py-1 rounded border bg-white hover:bg-slate-50 active">自由</button>
                                    <button data-aspect="1" class="crop-aspect-btn px-2 py-1 rounded border hover:bg-slate-50">1:1</button>
                                    <button data-aspect="1.333" class="crop-aspect-btn px-2 py-1 rounded border hover:bg-slate-50">4:3</button>
                                    <button data-aspect="1.777" class="crop-aspect-btn px-2 py-1 rounded border hover:bg-slate-50">16:9</button>
                                </div>
                            </div>

                            <div class="pt-2 flex flex-col gap-2">
                                <button id="crop-reset-btn" class="btn btn-secondary btn-sm text-xs">
                                    <i class="fa-solid fa-undo text-[10px]"></i> 重設選區
                                </button>
                                <button id="crop-full-btn" class="btn btn-secondary btn-sm text-xs">
                                    滿版 (不裁)
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="px-6 py-4 border-t bg-slate-50 flex gap-3">
                        <button onclick="this.closest('.fixed').remove()" 
                                class="btn btn-secondary flex-1 py-2.5 text-sm">取消</button>
                        <button id="crop-confirm-btn" class="btn btn-primary flex-1 py-2.5 text-sm">
                            ${opts.confirmLabel}
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            // 元素引用
            const container = modal.querySelector('#crop-container');
            const imgEl = modal.querySelector('#crop-src-img');
            const boxEl = modal.querySelector('#crop-box');
            const previewCanvas = modal.querySelector('#crop-preview-canvas');
            const previewCtx = previewCanvas.getContext('2d');
            const confirmBtn = modal.querySelector('#crop-confirm-btn');
            const resetBtn = modal.querySelector('#crop-reset-btn');
            const fullBtn = modal.querySelector('#crop-full-btn');
            const aspectBtns = modal.querySelectorAll('.crop-aspect-btn');

            let img = new Image();
            let displayW = 0, displayH = 0;
            let crop = { x: 0, y: 0, w: 0, h: 0 };
            let aspect = opts.defaultAspect;
            let isDragging = false;
            let dragMode = null; // 'move' | 'nw' | 'ne' | ...
            let startX = 0, startY = 0, startCrop = null;

            function setupDisplay(dataUrl) {
                img.onload = () => {
                    const maxDisplayW = 500;
                    const maxDisplayH = 380;
                    const scale = Math.min(maxDisplayW / img.width, maxDisplayH / img.height, 1);
                    displayW = Math.round(img.width * scale);
                    displayH = Math.round(img.height * scale);

                    container.style.width = displayW + 'px';
                    container.style.height = displayH + 'px';
                    imgEl.src = dataUrl;
                    imgEl.style.width = displayW + 'px';
                    imgEl.style.height = displayH + 'px';

                    initCropRect();
                    boxEl.style.display = 'block';
                    updateCropBox();
                    drawPreview();
                };
                img.src = dataUrl;
            }

            if (typeof source === 'string') {
                setupDisplay(source);
            } else {
                const reader = new FileReader();
                reader.onload = (ev) => setupDisplay(ev.target.result);
                reader.onerror = () => alert('檔案讀取失敗');
                reader.readAsDataURL(source);
            }

            function initCropRect() {
                if (!displayW || !displayH) return;

                let cw, ch;
                if (!aspect || aspect === 0) {
                    // free: 80% centered
                    cw = displayW * 0.8;
                    ch = displayH * 0.8;
                } else {
                    // compute max rect with aspect inside display
                    if (displayW / displayH > aspect) {
                        ch = displayH * 0.85;
                        cw = ch * aspect;
                    } else {
                        cw = displayW * 0.85;
                        ch = cw / aspect;
                    }
                }
                crop.x = (displayW - cw) / 2;
                crop.y = (displayH - ch) / 2;
                crop.w = cw;
                crop.h = ch;
            }

            function clampCrop() {
                crop.x = Math.max(0, Math.min(crop.x, displayW - crop.w));
                crop.y = Math.max(0, Math.min(crop.y, displayH - crop.h));
                crop.w = Math.max(20, Math.min(crop.w, displayW - crop.x));
                crop.h = Math.max(20, Math.min(crop.h, displayH - crop.y));

                if (aspect && aspect > 0) {
                    // 維持比例 (以寬為主調整高)
                    const newH = crop.w / aspect;
                    if (newH > displayH - crop.y) {
                        crop.w = (displayH - crop.y) * aspect;
                    }
                    crop.h = crop.w / aspect;
                    // 再 clamp
                    if (crop.x + crop.w > displayW) crop.x = displayW - crop.w;
                }
            }

            function updateCropBox() {
                if (!boxEl) return;
                boxEl.style.left = crop.x + 'px';
                boxEl.style.top = crop.y + 'px';
                boxEl.style.width = crop.w + 'px';
                boxEl.style.height = crop.h + 'px';
                drawPreview();
            }

            function drawPreview() {
                if (!previewCtx || !img || !displayW) return;
                previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);

                // 計算來源裁切區域 (相對於原始圖片)
                const scaleX = img.width / displayW;
                const scaleY = img.height / displayH;
                const sx = Math.max(0, Math.floor(crop.x * scaleX));
                const sy = Math.max(0, Math.floor(crop.y * scaleY));
                const sw = Math.floor(crop.w * scaleX);
                const sh = Math.floor(crop.h * scaleY);

                if (sw <= 0 || sh <= 0) return;

                // 目標預覽尺寸 (維持裁切比例)
                let pw = previewCanvas.width;
                let ph = previewCanvas.height;
                const cropAspect = sw / sh;
                if (cropAspect > pw / ph) {
                    ph = Math.round(pw / cropAspect);
                } else {
                    pw = Math.round(ph * cropAspect);
                }

                // 置中繪製
                const ox = (previewCanvas.width - pw) / 2;
                const oy = (previewCanvas.height - ph) / 2;

                previewCtx.drawImage(img, sx, sy, sw, sh, ox, oy, pw, ph);
            }

            // 滑鼠互動
            function getLocalPos(e) {
                const rect = container.getBoundingClientRect();
                return {
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top
                };
            }

            container.addEventListener('mousedown', (e) => {
                if (e.target.closest('.crop-handle')) return; // handle 另外處理
                const pos = getLocalPos(e);
                // 點擊在 box 內 = move
                if (pos.x >= crop.x && pos.x <= crop.x + crop.w &&
                    pos.y >= crop.y && pos.y <= crop.y + crop.h) {
                    dragMode = 'move';
                } else {
                    // 點擊外面 = 開始新選區 (從點擊處開始)
                    dragMode = 'new';
                    crop.x = Math.max(0, Math.min(pos.x, displayW - 30));
                    crop.y = Math.max(0, Math.min(pos.y, displayH - 30));
                    crop.w = 30;
                    crop.h = 30;
                    if (aspect) crop.h = crop.w / aspect;
                }
                startX = pos.x;
                startY = pos.y;
                startCrop = { ...crop };
                isDragging = true;
                updateCropBox();
                e.preventDefault();
            });

            // Handle 專用
            boxEl.querySelectorAll('.crop-handle').forEach(handle => {
                handle.addEventListener('mousedown', (e) => {
                    dragMode = handle.dataset.handle;
                    const pos = getLocalPos(e);
                    startX = pos.x;
                    startY = pos.y;
                    startCrop = { ...crop };
                    isDragging = true;
                    e.stopImmediatePropagation();
                    e.preventDefault();
                });
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging || !displayW) return;
                const pos = getLocalPos(e);
                const dx = pos.x - startX;
                const dy = pos.y - startY;

                if (dragMode === 'move') {
                    crop.x = startCrop.x + dx;
                    crop.y = startCrop.y + dy;
                } else if (dragMode === 'nw') {
                    crop.x = startCrop.x + dx;
                    crop.y = startCrop.y + dy;
                    crop.w = startCrop.w - dx;
                    crop.h = startCrop.h - dy;
                } else if (dragMode === 'ne') {
                    crop.y = startCrop.y + dy;
                    crop.w = startCrop.w + dx;
                    crop.h = startCrop.h - dy;
                } else if (dragMode === 'sw') {
                    crop.x = startCrop.x + dx;
                    crop.w = startCrop.w - dx;
                    crop.h = startCrop.h + dy;
                } else if (dragMode === 'se') {
                    crop.w = startCrop.w + dx;
                    crop.h = startCrop.h + dy;
                } else if (dragMode === 'new') {
                    crop.w = Math.abs(dx);
                    crop.h = Math.abs(dy);
                    if (dx < 0) crop.x = startX + dx;
                    if (dy < 0) crop.y = startY + dy;
                }

                if (aspect && aspect > 0 && dragMode !== 'move' && dragMode !== 'new') {
                    // 鎖比例時調整另一邊 (以 w 為基準)
                    if (dragMode.includes('w') || dragMode.includes('e')) {
                        crop.h = crop.w / aspect;
                    } else {
                        crop.w = crop.h * aspect;
                    }
                }

                clampCrop();
                updateCropBox();
            });

            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    dragMode = null;
                    clampCrop();
                    updateCropBox();
                }
            });

            // Aspect 按鈕
            aspectBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    aspectBtns.forEach(b => b.classList.remove('bg-[#069494]', 'text-white', 'border-[#069494]'));
                    btn.classList.add('bg-[#069494]', 'text-white', 'border-[#069494]');

                    const val = parseFloat(btn.dataset.aspect);
                    aspect = (val > 0) ? val : 0;

                    // 調整目前選區符合新比例
                    if (aspect > 0) {
                        const oldW = crop.w;
                        crop.h = oldW / aspect;
                        // 如果超出，縮小
                        if (crop.y + crop.h > displayH) {
                            crop.h = displayH - crop.y;
                            crop.w = crop.h * aspect;
                        }
                        if (crop.x + crop.w > displayW) {
                            crop.w = displayW - crop.x;
                            crop.h = crop.w / aspect;
                        }
                    }
                    clampCrop();
                    updateCropBox();
                });
            });

            setTimeout(() => {
                const defaultBtn = Array.from(aspectBtns).find(b => b.dataset.aspect === String(opts.defaultAspectButton));
                if (defaultBtn) defaultBtn.click();
            }, 50);

            // 重設選區
            resetBtn.onclick = () => {
                initCropRect();
                updateCropBox();
            };

            // 滿版 (使用整張，不裁切)
            fullBtn.onclick = async () => {
                try {
                    let dataURL;
                    if (typeof source === 'string') {
                        dataURL = await resizeDataURLToDataURL(source, opts.fullResizeMaxW, opts.fullResizeMaxH, opts.fullResizeQuality);
                    } else {
                        dataURL = await resizeImageToDataURL(source, opts.fullResizeMaxW, opts.fullResizeMaxH, opts.fullResizeQuality);
                    }
                    modal.remove();
                    onConfirm(dataURL);
                } catch (e) {
                    alert('處理失敗');
                }
            };

            // 確認裁切
            confirmBtn.onclick = () => {
                if (!img.width || !displayW) {
                    alert('圖片尚未載入完成，請稍候再試');
                    return;
                }
                if (crop.w < 10 || crop.h < 10) {
                    alert('選取區域太小');
                    return;
                }

                // 計算原始圖片上的裁切座標
                const scaleX = img.width / displayW;
                const scaleY = img.height / displayH;
                const sx = Math.max(0, Math.floor(crop.x * scaleX));
                const sy = Math.max(0, Math.floor(crop.y * scaleY));
                const sw = Math.max(1, Math.floor(crop.w * scaleX));
                const sh = Math.max(1, Math.floor(crop.h * scaleY));

                const cropAspect = sw / sh;
                let outW = opts.outputMax;
                let outH = Math.round(outW / cropAspect);
                if (outH > opts.outputMax) {
                    outH = opts.outputMax;
                    outW = Math.round(outH * cropAspect);
                }

                const outCanvas = document.createElement('canvas');
                outCanvas.width = outW;
                outCanvas.height = outH;
                const ctx = outCanvas.getContext('2d', { alpha: false });
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(img, sx, sy, sw, sh, 0, 0, outW, outH);

                const dataURL = outCanvas.toDataURL('image/jpeg', opts.outputQuality);
                modal.remove();
                onConfirm(dataURL);
            };

        }

        // ==================== Japanese-aware Tokenizer (已停用) ====================
        // V0.85+ / V0.88: 使用者要求完全移除內建 tokenize 功能
        // 此函數保留僅供參考，程式中已無任何呼叫
        function tokenizeJapanese(text) {
            const tokens = [];
            const lines = text.split('\n');

            try {
                const segmenter = new Intl.Segmenter('ja', { granularity: 'word' });

                lines.forEach((line, lineIndex) => {
                    if (!line.trim()) {
                        tokens.push({ type: 'break' });
                        return;
                    }

                    const segments = Array.from(segmenter.segment(line));
                    segments.forEach(seg => {
                        const value = seg.segment;
                        if (!value || !value.trim()) return;

                        if (/^\s+$/.test(value)) {
                            tokens.push({ type: 'space' });
                        } else if (/^[、。！？「」『』…ー・\.\,\!\?\;\:\-\(\)\[\]]+$/.test(value)) {
                            tokens.push({ type: 'punct', value });
                        } else {
                            tokens.push({ type: 'text', value });
                        }
                    });

                    if (lineIndex < lines.length - 1) {
                        tokens.push({ type: 'break' });
                    }
                });
            } catch (e) {
                // Fallback
                const regex = /([\u3040-\u30ff\u4e00-\u9fff々]+|[、。！？「」『』…ー・\s])/g;
                const parts = text.match(regex) || [];
                parts.forEach(part => {
                    if (/^\s+$/.test(part)) tokens.push({ type: 'space' });
                    else if (/^[、。！？「」『』…ー・]+$/.test(part)) tokens.push({ type: 'punct', value: part });
                    else if (part.trim()) tokens.push({ type: 'text', value: part });
                });
            }

            return tokens;
        }

        function getEffectiveTokens(rawTokens) {
            if (!currentBook) return rawTokens;
            let tokens = [...rawTokens];

            // Apply splits first (support chained / multi-level splits: split a line, then split one of the resulting parts further)
            const splits = currentBook.customSplits || {};
            let changed = true;
            let iterations = 0;
            const MAX_ITER = 20; // safety for deeply nested splits
            while (changed && iterations < MAX_ITER) {
                changed = false;
                iterations++;
                const afterSplit = [];
                for (const tok of tokens) {
                    if (tok.type === 'text' && splits[tok.value]) {
                        splits[tok.value].forEach((p, idx) => {
                            const newTok = { type: 'text', value: p };
                            // inherit local ann to first part as starting point (V0.85 / V0.88)
                            if (tok.annotation && idx === 0) {
                                newTok.annotation = { ...tok.annotation };
                                if (tok.annotation._userCustomized) {
                                    newTok.annotation._userCustomized = true;
                                }
                            }
                            afterSplit.push(newTok);
                        });
                        changed = true;
                    } else {
                        afterSplit.push(tok);
                    }
                }
                tokens = afterSplit;
            }

            // Then merges - iterative to support chained merges (A+B then AB+C)
            let merges = currentBook.customMerges || [];
            if (merges.length > 0) {
                const mergeSet = new Set();
                merges.forEach(p => {
                    if (Array.isArray(p) && p.length === 2) {
                        mergeSet.add(p[0] + '|' + p[1]);
                    }
                });

                let changed = true;
                let iterations = 0;
                const MAX_ITER = 10; // safety

                while (changed && iterations < MAX_ITER) {
                    changed = false;
                    iterations++;
                    const afterMerge = [];
                    let i = 0;
                    while (i < tokens.length) {
                        const cur = tokens[i];
                        if (cur.type === 'text' && i + 1 < tokens.length) {
                            const next = tokens[i + 1];
                            if (next.type === 'text') {
                                const key = cur.value + '|' + next.value;
                                if (mergeSet.has(key)) {
                                    const mergedTok = { type: 'text', value: cur.value + next.value };
                                    // inherit local ann from either (V0.85 / V0.88 album cover)
                                    if (cur.annotation || next.annotation) {
                                        mergedTok.annotation = { ...(cur.annotation || next.annotation) };
                                        if ((cur.annotation && cur.annotation._userCustomized) || (next.annotation && next.annotation._userCustomized)) {
                                            mergedTok.annotation._userCustomized = true;
                                        }
                                    }
                                    afterMerge.push(mergedTok);
                                    i += 2;
                                    changed = true;
                                    continue;
                                }
                            }
                        }
                        afterMerge.push(cur);
                        i++;
                    }
                    tokens = afterMerge;
                }
            }

            return tokens;
        }

        // ==================== Raw Lyrics View (V0.85 / V0.88: do not auto-split on input) ====================
        // When a book has rawLyrics but no tokens yet, we show the original text here
        // instead of running tokenizeJapanese. User must explicitly click "分析歌詞"
        // or use AI import to enter the tokenized morpheme editing mode.
        function renderRawLyricsView() {
            const display = document.getElementById('morpheme-display');
            if (!display || !currentBook) return;

            const raw = currentBook.rawLyrics || '';

            // Create a safe container for the raw text

            display.appendChild(container);

            // Instructional call-to-action

            cta.innerHTML = `
                目前沒有語素資料。<br>
                點擊左側「分析歌詞」可依原始分行建立初始單位（每行一個語素），<br>
                之後再用「從 AI 導入」（推薦使用新提示詞讓 AI 回報 line 以保留分行）或手動校正細拆。
            `;
            display.appendChild(cta);
        }

        /**
         * 依原始歌詞分行建立初始單位（每行作為一個粗粒度語素）
         * 「分析歌詞」按鈕使用此函數：不做細粒度 morpheme 切分，
         * 只依照使用者原始貼上的歌詞分行建立「行單位」，方便後續 AI 導入時能保留分行結構（新版提示詞可讓 AI 直接回報 line 資訊，匯入更精準）。
         */
        function createInitialTokensFromLines(text) {
            if (!text) return [];
            const lines = text.split(/\r?\n/);
            const tokens = [];

            lines.forEach((line, idx) => {
                const trimmed = line.trim();
                if (trimmed.length > 0) {
                    tokens.push({ type: 'text', value: trimmed });
                }
                // 在非最後一行後加入 break（包含空行也會產生對應的 break）
                if (idx < lines.length - 1) {
                    tokens.push({ type: 'break' });
                }
            });

            return tokens;
        }

        /**
         * 內部工具：將 AI 導入的扁平細粒度語素，自動重新對齊回「分析歌詞」準備的原始分行結構。
         * 使用字元長度貪婪分配（與舊 correctLyricsLineBreaks 類似邏輯）。
         */
        function realignFlatTokensToRawLines(flatTokens, rawLyrics) {
            // 舊版相容 fallback：當 AI 輸出未附 "line" 時使用長度累積猜測分組
            if (!flatTokens || flatTokens.length === 0 || !rawLyrics) {
                return flatTokens || [];
            }

            const lines = rawLyrics.split(/\r?\n/);
            const result = [];
            let ptr = 0;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (!line.trim()) {
                    result.push({ type: 'break' });
                    continue;
                }

                const startPtr = ptr;
                let accumulatedLen = 0;
                const targetLen = line.trim().length;
                const tolerance = Math.max(2, Math.floor(targetLen * 0.18));

                while (ptr < flatTokens.length) {
                    const tok = flatTokens[ptr];
                    const tokLen = (tok.value || '').length;

                    if (accumulatedLen > 0 && accumulatedLen + tokLen > targetLen + tolerance) {
                        break;
                    }

                    accumulatedLen += tokLen;
                    ptr++;
                }

                // 至少給一個（避免空行）
                if (ptr === startPtr && ptr < flatTokens.length) {
                    ptr++;
                }

                for (let j = startPtr; j < ptr; j++) {
                    result.push(flatTokens[j]);
                }

                if (i < lines.length - 1) {
                    result.push({ type: 'break' });
                }
            }

            // 剩餘的補到最後
            while (ptr < flatTokens.length) {
                result.push(flatTokens[ptr++]);
            }

            return result;
        }

        /**
         * 根據 AI 回傳的 line 欄位 + 使用者 rawLyrics 的原始分行，產生帶 break 的 tokens 陣列。
         * 這比純長度 heuristic (realign) 更可靠，能正確處理空白行與 AI 明確指定的行歸屬。
         */
        function buildStructuredTokensFromLines(annotatedTokens, rawLyrics) {
            if (!rawLyrics) {
                return annotatedTokens.map(t => {
                    const tok = { type: 'text', value: t.surface || t.value || '' };
                    const hasAnnData = t.meaning || t.explanation || t.pos || t.furigana || t.note || t.phonetic || t.lemma || t.inflection;
                    if (hasAnnData) {
                        tok.annotation = {
                            meaning: t.meaning || '',
                            translation: t.meaning || '',
                            explanation: t.explanation || '',
                            pos: t.pos || '',
                            furigana: t.furigana || '',
                            note: t.note || '',
                            phonetic: t.phonetic || '',
                            lemma: (currentBook && currentBook.language === 'ja' ? sanitizeJaLemma(t.lemma || '') : (t.lemma || '')),
                            inflection: t.inflection || ''
                        };
                    }
                    return tok;
                });
            }
            const lines = rawLyrics.split(/\r?\n/);
            const byLine = new Map();
            annotatedTokens.forEach(t => {
                let ln = (t.line != null) ? parseInt(t.line, 10) : 1;
                if (isNaN(ln)) ln = 1;
                if (!byLine.has(ln)) byLine.set(ln, []);
                const tok = { type: 'text', value: t.surface || t.value || '' };
                const hasAnnData = t.meaning || t.explanation || t.pos || t.furigana || t.note || t.phonetic || t.lemma || t.inflection;
                if (hasAnnData) {
                    tok.annotation = {
                        meaning: t.meaning || '',
                        translation: t.meaning || '',
                        explanation: t.explanation || '',
                        pos: t.pos || '',
                        furigana: t.furigana || '',
                        note: t.note || '',
                        phonetic: t.phonetic || '',
                        lemma: (currentBook && currentBook.language === 'ja' ? sanitizeJaLemma(t.lemma || '') : (t.lemma || '')),
                        inflection: t.inflection || ''
                    };
                }
                byLine.get(ln).push(tok);
            });
            const result = [];
            for (let i = 0; i < lines.length; i++) {
                const ln = i + 1;
                const group = byLine.get(ln) || [];
                result.push(...group);
                if (i < lines.length - 1) {
                    result.push({ type: 'break' });
                }
            }
            return result;
        }

        // ==================== Render Morphemes ====================
        function processLyrics(silent = false, preserveExistingTokens = false, forceTokenize = false) {
            const input = document.getElementById('lyrics-input').value.trim();
            const display = document.getElementById('morpheme-display');

            if (!input || !currentBook) {
                display.innerHTML = `<div class="text-center text-slate-400 pt-16">請輸入歌詞後點擊「分析歌詞」<br>依原始分行建立初始單位</div>`;
                return;
            }

            currentBook.rawLyrics = input;
            saveCurrentBook();

            const hasExistingTokens = currentBook.tokens && currentBook.tokens.length > 0;

            let tokens;

            if (forceTokenize) {
                // 「分析歌詞」現在的功能（V0.85+ / V0.88 album cover）：
                // 不使用 morpheme tokenizer，而是「依原始歌詞分行」建立初始單位
                // 每行變成一個 text token，後續可再用 AI 導入細拆或手動校正
                const lineTokens = createInitialTokensFromLines(input);
                currentBook.tokens = lineTokens;
                saveBooks();

                showToast('已依原始歌詞分行建立初始單位（每行一個語素，可後續用 AI 導入（新提示詞會自動帶 line 資訊保留分行）或手動細拆）');

                tokens = getEffectiveTokens(currentBook.tokens);
            } else if (hasExistingTokens) {
                // 已有 tokens（AI 導入、手動建立等）→ 直接渲染
                tokens = getEffectiveTokens(currentBook.tokens);
            } else {
                // 沒有 tokens → 顯示原始歌詞畫面
                renderRawLyricsView();
                saveBooks();
                return;
            }

            saveBooks();

            display.innerHTML = '';
            display.classList.add('leading-relaxed');

            let count = 0;

            for (let index = 0; index < tokens.length; index++) {
                const token = tokens[index];

                if (token.type === 'text') {
                    const value = token.value;

                    // If this word is currently in visual split mode, render dividers instead
                    if (correctionMode && currentSplittingWord === value) {
                        const splitUI = createSplitInterface(value);
                        display.appendChild(splitUI);
                        count++;
                        continue;
                    }

                    const span = document.createElement('span');
                    span.className = `morpheme ${currentBook.customMerges?.some(p => p[0] + p[1] === value) || currentBook.customSplits?.[value] ? 'corrected' : ''}`;
                    if (token.annotation && token.annotation._userCustomized) {
                        span.classList.add('has-local-annotation');
                        span.title = '此處有專屬獨立語素意思（與其他相同字面不同）';
                    }
                    span.dataset.surface = value;

                    const ann = token.annotation || currentBook.annotations?.[value] || {};
                    if (ann && ann.pos && POS_COLORS[ann.pos]) {
                        const c = POS_COLORS[ann.pos];
                        span.style.backgroundColor = c.bg;
                        span.style.color = c.text;
                        span.style.borderColor = c.border;
                        span.style.borderWidth = '1px';
                        span.style.borderStyle = 'solid';
                    }

                    // 左側語素欄位不再顯示平假名（改在右側詳情面板呈現與編輯）
                    span.textContent = value;

                    if (correctionMode) {
                        span.dataset.morphemeIndex = count;

                        // Behavior depends on submode
                        span.onclick = (e) => {
                            e.stopImmediatePropagation();

                            if (correctionSubMode === 'split' && value.length > 1) {
                                // Split mode: enter visual divider for this morpheme
                                currentSplittingWord = value;
                                correctionSelected.clear();
                                processLyrics(true);
                                return;
                            }

                            // Merge mode (default): toggle selection for any length
                            const idx = parseInt(span.dataset.morphemeIndex);
                            if (correctionSelected.has(idx)) {
                                correctionSelected.delete(idx);
                                span.classList.remove('selected');
                            } else {
                                correctionSelected.add(idx);
                                span.classList.add('selected');
                            }
                            updateMergeButtonState();
                        };
                    } else {
                        span.addEventListener('click', () => {
                            if (isPanelLocked && lockedWord === value) {
                                isPanelLocked = false;
                                lockedWord = null;
                                resetExplanationToEmpty();
                            } else {
                                lockPanel(value, span, token);
                            }
                        });
                    }

                    const thisToken = token;
                    if (!isMobileLayout()) {
                        span.addEventListener('mouseenter', () => showExplanation(value, span, thisToken));
                        span.addEventListener('mouseleave', () => clearActive(span));
                    }

                    display.appendChild(span);
                    count++;
                } else if (token.type === 'break') {
                    display.appendChild(document.createElement('br'));
                } else if (token.type === 'space') {
                    display.appendChild(document.createTextNode(' '));
                } else {
                    const span = document.createElement('span');
                    span.textContent = token.value;
                    span.className = 'text-slate-400';
                    display.appendChild(span);
                }
            }

            document.getElementById('token-count').textContent = `${count} 個語素`;
            if (!silent) showToast('分析完成');

            // Auto-hide the original lyrics input after successful analysis
            // User explicitly wants: once parsed into morphemes, the raw lyrics column should stay hidden.
            if (!silent && count > 0) {
                hideLyricsInput();
            }
        }

        // Auto-resize textarea height to fit content (no internal scrollbar)
        // Now scale-aware: when --info-scale makes font larger, we lengthen the field (height) so text isn't clipped.
        function autoResizeTextarea(textarea) {
            if (!textarea) return;
            // Temporarily remove explicit height so browser can compute natural scrollHeight at current (scaled) font size
            textarea.style.height = 'auto';
            // Read current scale to compute a reasonable min (prevents tiny height at large scale for short/empty content)
            const cs = getComputedStyle(document.documentElement);
            const scaleStr = cs.getPropertyValue('--info-scale').trim();
            const scale = parseFloat(scaleStr) || 1;
            const baseMin = 52;
            const minH = Math.max(baseMin, Math.round(baseMin * scale));
            const newHeight = Math.max(textarea.scrollHeight, minH);
            textarea.style.height = newHeight + 'px';
        }

        // V0.98+: 為日語動詞等變化形提供精準字典查詢。
        // 優先使用 ann.lemma（AI 匯入或未來 UI），否則從「解釋」欄（explanation/meaning）偵測「原形 / 原型 / lemma」等關鍵字。
        // 找不到則回退 surface（目前出現在歌詞裡的實際形態）。
        const JA_DICT_QUOTE_CHARS = /[「『」』"'`＂＇]/g;

        function sanitizeJaLemma(raw) {
            if (!raw) return '';
            let s = raw.toString().trim();
            // 移除任何「（五段動詞...」或「(explanation)」之類的後綴，確保字典連結乾淨
            s = s.split(/[（(]/)[0].trim();
            s = s.replace(/[、，。;；\)\）\]\]\s、]+$/, '');
            // 字典查詢嚴禁帶引號（如「言う」→ 言う）
            s = s.replace(JA_DICT_QUOTE_CHARS, '');
            return s.trim();
        }

        function toJaDictLookupQuery(form) {
            return sanitizeJaLemma(form);
        }

        function getJaDictionaryForm(surface, ann = {}, langOverride = null) {
            if (!surface) return '';
            const effectiveLang = langOverride || (currentBook && currentBook.language) || 'ja';
            if (effectiveLang !== 'ja') {
                return surface;
            }

            const jaLemmaToken = /[^\s、，。;；\n\r、（(）)「」『』"'`＂＇]{1,15}/;

            // 1. 明確的 lemma（AI 常以 "lemma", "原形", "originalForm", "base" 匯入，或使用者在面板的「原形」欄位填寫）
            const explicit = sanitizeJaLemma(ann.lemma || ann.originalForm || ann.base || ann['原形'] || '');
            if (explicit) return explicit;

            // 2. 從語素解釋欄（explanation）裡偵測常見寫法
            const exp = (ann.explanation || ann.meaning || '').toString().trim();
            if (exp) {
                const patterns = [
                    // 原形は「言う」、lemma:「食べる」等帶引號寫法（capture 後由 sanitizeJaLemma 去引號）
                    /(?:原形|原型|lemma|base|字典形式|原形は|原型は)\s*[:：ははを\s]*[「『]([^」』]{1,15})[」』]/i,
                    // 「原形は歌う」「原型：食べる」「lemma: 書く」「原形 走る」
                    new RegExp('(?:原形|原型|lemma|base|字典形式|原形は|原型は)\\s*[:：ははを\\s]*(' + jaLemmaToken.source + ')', 'i'),
                    // 解釋開頭直接寫原形，例如 "歌う（五段動詞・他動詞）..." 或 "食べる（一段）"
                    /^[\s\u3000]*([^\s、，。;；\n\r、（(「」『』"'`＂＇]{1,15}?(?:う|く|す|つ|ぬ|ふ|む|る|ぐ|ず|づ|ぶ|ぷ))[\s（(]/,
                    new RegExp('原形\\s+(' + jaLemmaToken.source + ')', 'i'),
                ];
                for (const re of patterns) {
                    const m = exp.match(re);
                    if (m && m[1]) {
                        const cand = sanitizeJaLemma(m[1]);
                        // 基本檢查：包含日文文字且長度合理
                        if (cand && /[\u3040-\u30FF\u3400-\u9FFF]/.test(cand) && cand.length >= 1 && cand.length <= 15) {
                            return cand;
                        }
                    }
                }
            }

            // 3. 回退到 surface（歌詞裡實際出現的形態），同樣清除引號
            return sanitizeJaLemma(surface);
        }

        let _mobileLayoutMQ = null;

        function isMobileLayout() {
            return document.body.classList.contains('mobile-layout');

        function applyMobileLayoutClass(matches) {
            document.body.classList.toggle('mobile-layout', matches);
            const sheet = document.getElementById('mobile-explanation-sheet');
            if (!matches) {
                if (sheet) {
                    sheet.classList.remove('is-open');
                    sheet.setAttribute('aria-hidden', 'true');
                }
                document.body.style.overflow = '';
            }
        }

        function initMobileLayout() {
            _mobileLayoutMQ = window.matchMedia('(max-width: 767px)');
            applyMobileLayoutClass(_mobileLayoutMQ.matches);
            const onChange = (e) => applyMobileLayoutClass(e.matches);
            if (_mobileLayoutMQ.addEventListener) {

                _mobileLayoutMQ.addListener(onChange);

        }

        function bindExplanationPanelEvents(panel, surface) {
            if (!panel) return;

            const transTa = panel.querySelector('.translation-textarea');
            if (transTa) {
                transTa.addEventListener('blur', () => saveTranslation(surface, transTa.value));
                transTa.addEventListener('input', () => autoResizeTextarea(transTa));
                transTa.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        saveTranslation(surface, transTa.value);

        function applyMerge(left, right) {

            const merged = left + right;
            if (!currentBook.customMerges) currentBook.customMerges = [];

            const already = currentBook.customMerges.some(p => p[0] === left && p[1] === right);
            if (!already) currentBook.customMerges.push([left, right]);

            // Migrate annotation
            const ann = currentBook.annotations || (currentBook.annotations = {});
            if (ann[left] || ann[right]) {
                ann[merged] = ann[left] || ann[right];
            }
            delete ann[left]; delete ann[right];

        function applySplit(word) {
            if (!currentBook) return;
            const partsStr = prompt(`請輸入拆分後的語素（用逗號分隔，至少兩個）：`, word.split('').join(','));
            if (!partsStr) return;

            let parts = partsStr.split(/[,，\s]+/).map(p => p.trim()).filter(Boolean);
            if (parts.length < 2) { alert('至少需要兩個部分'); return; }

            if (!currentBook.customSplits) currentBook.customSplits = {};
            currentBook.customSplits[word] = parts;

            // Migrate annotation to first part
            const ann = currentBook.annotations || (currentBook.annotations = {});
            if (ann[word]) {
                ann[parts[0]] = ann[word];
                delete ann[word];
            }

            // Clean up any merges that created this exact word (important for splitting previously merged tokens)
            if (currentBook.customMerges) {
                currentBook.customMerges = currentBook.customMerges.filter(m => {
                    if (Array.isArray(m) && m.length === 2) {
                        if ((m[0] + m[1]) === word) return false;
                        return m[0] !== word && m[1] !== word;
                    }
                    return true;
                });
            }

            saveBooks();
            processLyrics(true);
            showToast(`已拆分為 ${parts.join(' + ')}`);
        }

        // ==================== New Multi-Select Merge ====================
        function mergeSelectedMorphemes() {
            if (!currentBook || correctionSelected.size < 2) return;

            const display = document.getElementById('morpheme-display');
            if (!display) return;

            // Get selected spans in DOM order
            const selectedSpans = Array.from(display.querySelectorAll('.morpheme.selected'))
                .sort((a, b) => {
                    const ai = parseInt(a.dataset.morphemeIndex || '0');
                    const bi = parseInt(b.dataset.morphemeIndex || '0');
                    return ai - bi;
                });

            if (selectedSpans.length < 2) return;

            // Verify they are consecutive
            let indices = selectedSpans.map(s => parseInt(s.dataset.morphemeIndex));
            indices.sort((a, b) => a - b);

            const isConsecutive = indices.every((val, i) => i === 0 || val === indices[i-1] + 1);
            if (!isConsecutive) {
                alert('請選擇連續的語素才能合併');
                return;
            }

            // Get the combined value from current effective tokens
            const combinedValue = selectedSpans.map(s => s.textContent).join('');

            // Get the first and last values for recording merges
            const firstVal = selectedSpans[0].textContent;
            const lastVal = selectedSpans[selectedSpans.length - 1].textContent;

            // Record merges so that getEffectiveTokens can reconstruct
            if (!currentBook.customMerges) currentBook.customMerges = [];

            const values = selectedSpans.map(s => s.textContent);

            // Record all adjacent pairs in the selection (this allows current logic to work for chains)
            for (let i = 0; i < values.length - 1; i++) {
                const already = currentBook.customMerges.some(p => 
                    Array.isArray(p) && p[0] === values[i] && p[1] === values[i+1]
                );
                if (!already) {
                    currentBook.customMerges.push([values[i], values[i+1]]);
                }
            }

            // Migrate annotations: keep the first one's annotation on the combined
            const ann = currentBook.annotations || (currentBook.annotations = {});
            const firstAnn = ann[firstVal];
            if (firstAnn) {
                ann[combinedValue] = firstAnn;
            }
            // Remove annotations from the individual parts
            selectedSpans.forEach(s => delete ann[s.textContent]);

            saveBooks();

            // Clear selection
            correctionSelected.clear();
            currentSplittingWord = null;
            const mergeBtn = document.getElementById('merge-selected-btn');
            if (mergeBtn) mergeBtn.disabled = true;

            processLyrics(true);
            showToast(`已合併為「${combinedValue}」`);
        }

        function createSplitInterface(word) {
            const container = document.createElement('span');
            container.className = 'inline-flex items-center bg-amber-50 border border-amber-300 rounded-lg px-1 py-0.5 mx-0.5';

            const chars = Array.from(word);

            chars.forEach((char, i) => {
                // Character
                const charSpan = document.createElement('span');
                charSpan.textContent = char;
                charSpan.className = 'px-1 font-medium text-slate-800 select-none';
                container.appendChild(charSpan);

                // Clickable divider (except after last)
                if (i < chars.length - 1) {
                    const divider = document.createElement('span');
                    divider.textContent = '|';
                    divider.className = 'mx-0.5 text-amber-500 hover:text-amber-700 hover:bg-amber-200 cursor-pointer px-1 rounded transition-colors font-bold select-none';
                    divider.title = `在這裡拆分為「${chars.slice(0, i+1).join('')} + ${chars.slice(i+1).join('')}」`;

                    divider.onclick = (e) => {
                        e.stopImmediatePropagation();
                        performSplitAtPosition(word, i + 1);
                    };

                    container.appendChild(divider);
                }
            });

            // Cancel button
            const cancel = document.createElement('button');
            cancel.textContent = '×';
            cancel.className = 'ml-2 text-amber-600 hover:text-amber-800 font-bold text-lg leading-none px-1';
            cancel.onclick = (e) => {

                currentSplittingWord = null;
                processLyrics(true);
            };
            container.appendChild(cancel);

            return container;
        }

        function performSplitAtPosition(word, splitAfterIndex) {
            if (!currentBook || !word || splitAfterIndex <= 0) return;

            const chars = Array.from(word);
            if (splitAfterIndex >= chars.length) return;

            const part1 = chars.slice(0, splitAfterIndex).join('');
            const part2 = chars.slice(splitAfterIndex).join('');

            if (!part1 || !part2) return;

            if (!currentBook.customSplits) currentBook.customSplits = {};
            currentBook.customSplits[word] = [part1, part2];

            // Migrate annotation to first part (keep previous behavior)
            const ann = currentBook.annotations || (currentBook.annotations = {});
            if (ann[word]) {
                ann[part1] = ann[word];
                delete ann[word];
            }

            // Clean up merges that created this exact combined word (this is the key fix for "split not working" on previously merged tokens)
            if (currentBook.customMerges) {
                currentBook.customMerges = currentBook.customMerges.filter(m => {
                    if (Array.isArray(m) && m.length === 2) {
                        // Remove the merge that produced exactly this word
                        if ((m[0] + m[1]) === word) return false;
                        // Also remove if it references the old combined word as a part
                        return m[0] !== word && m[1] !== word;
                    }
                    return true;
                });
            }

            currentSplittingWord = null;
            saveBooks();
            processLyrics(true);
            showToast(`已拆分為「${part1} + ${part2}」`);
        }

            if (settingsSelectedBookIds.size === 0) return;

            const idsToDelete = new Set(settingsSelectedBookIds);
            const selectedBooks = books.filter(b => idsToDelete.has(b.id));
            const count = selectedBooks.length;
            const preview = selectedBooks.slice(0, 5).map(b => `· ${b.title}`).join('\n');
            const moreHint = count > 5 ? `\n…等共 ${count} 本` : '';

            if (!confirm(`確定要刪除所選的 ${count} 本歌詞本嗎？\n\n${preview}${moreHint}\n\n此操作無法復原。`)) return;

            books = books.filter(b => !idsToDelete.has(b.id));
            await saveBooks(true);
            refreshDictionaryIfOpen();
            showToast(`已刪除 ${count} 本歌詞本`);
            handleBooksDeletedFromSettings(idsToDelete);

        function getAllDictionaryEntries() {
            const entries = [];
            const seen = new Map();

            books.forEach(book => {
                const lang = book.language || 'ja';
                const anns = book.annotations || {};
                Object.entries(anns).forEach(([surface, ann]) => {
                    const key = `${lang}::${surface}`;
                    if (!seen.has(key)) {
                        seen.set(key, true);
                        entries.push({
                            surface,
                            lang,
                            pos: normalizePOS(ann.pos || '其他', lang),
                            translation: ann.translation || '',
                            explanation: ann.explanation || ann.meaning || '',  // 向後相容
                            note: ann.note || '',
                            furigana: ann.furigana || '',
                            phonetic: ann.phonetic || '',
                            lemma: ann.lemma || '',
                            inflection: ann.inflection || '',
                            bookTitle: book.title || '未命名'
                        });
                    }
                });
            });

            // Sort nicely for Japanese + CJK (V0.85: lang-aware for ko; V0.86: + fr; V0.88 album)
            return entries.sort((a, b) => a.surface.localeCompare(b.surface, a.lang === 'ko' ? 'ko' : 'ja'));
        }

        function getLangLabel(lang) {
            if (lang === 'ja') return '日語';
            if (lang === 'ko') return '韓語';
            if (lang === 'fr') return '法語';
            return lang.toUpperCase();
        }

        function renderDictionary() {
            const container = document.getElementById('dict-results');
            const empty = document.getElementById('dict-empty');
            const totalEl = document.getElementById('dict-total');
            if (!container || !empty) return;

            normalizeAllKoreanPOS(); // guarantee no raw Korean POS in current books[] for this render + pills
            const allEntries = getAllDictionaryEntries();

            // Apply filters
            let filtered = allEntries.filter(entry => {
                if (dictFilters.language !== 'all' && entry.lang !== dictFilters.language) return false;
                if (dictFilters.pos.size > 0 && !dictFilters.pos.has(entry.pos)) return false;

                const q = (dictFilters.search || '').toLowerCase().trim();
                if (q) {
                    const hay = `${entry.surface} ${entry.furigana} ${entry.phonetic} ${entry.lemma} ${entry.translation} ${entry.explanation} ${entry.note} ${entry.inflection}`.toLowerCase();
                    if (!hay.includes(q)) return false;
                }
                return true;
            });

            if (totalEl) totalEl.textContent = filtered.length;

            // Re-render filter UI
            renderDictLangPills();
            renderDictPOSPills(allEntries);

            container.innerHTML = '';

            if (filtered.length === 0) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            const cjk = 'ja'; // default sort feeling
            filtered.forEach(entry => {
                const c = POS_COLORS[entry.pos] || { bg: "#C0CCD8", text: "#1F2937", border: "#A0B0C0" };

                const lookup = entry.lang === 'ja'
                    ? toJaDictLookupQuery(getJaDictionaryForm(entry.surface, entry, entry.lang))
                    : entry.surface;
                const jaUsesLemma = entry.lang === 'ja' && lookup !== toJaDictLookupQuery(entry.surface);

                const card = document.createElement('div');
                card.className = 'bg-white border border-slate-200 rounded-2xl p-4 hover:border-slate-300 transition-all';
                card.innerHTML = `
                    <div class="flex items-start justify-between gap-x-2">
                        <div>
                            ${entry.lang === 'ja' ? 
                                `<a href="https://www.sigure.tw/dict/jp/${encodeURIComponent(lookup)}" target="_blank" rel="noopener noreferrer" class="font-semibold text-xl tracking-tighter text-[#069494] hover:underline" title="${jaUsesLemma ? '跳轉至字典原型「' + lookup + '」（來自解釋欄）' : ''}">${entry.surface}</a>` : 
                                `<div class="font-semibold text-xl tracking-tighter">${entry.surface}</div>`}
                            ${entry.furigana ? `<div class="info-value-sm text-slate-400 tracking-wider">${entry.furigana}</div>` : ''}
                            ${entry.phonetic ? `<div class="info-value-10 text-[#069494] tracking-wider font-mono">${entry.phonetic}</div>` : ''}
                        </div>
                        <span class="text-[10px] px-2.5 py-0.5 rounded-full flex-shrink-0 font-medium"
                              style="background:${c.bg}; color:${c.text}; border:1px solid ${c.border}">
                            ${entry.pos}
                        </span>
                    </div>
                    <div class="mt-1.5 text-sm text-slate-600 leading-snug">
                        ${entry.translation ? `<div><span class="info-value-sm text-slate-400">翻譯：</span><span class="info-value">${entry.translation}</span></div>` : ''}
                        ${entry.explanation ? `<div class="mt-0.5"><span class="info-value-sm text-slate-400">解釋：</span><span class="info-value">${entry.explanation}</span></div>` : ''}
                        ${!entry.translation && !entry.explanation ? '<span class="text-slate-400">（尚未填寫）</span>' : ''}
                    </div>

                    <div class="mt-3 pt-2 border-t border-slate-100 flex items-center justify-between text-[10px]">
                        <span class="px-2 py-0.5 bg-slate-100 text-slate-500 rounded">${getLangLabel(entry.lang)}</span>

                `;
                container.appendChild(card);
            });
